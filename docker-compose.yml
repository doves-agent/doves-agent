# 白鸽 2.0 Docker Compose 部署配置
# 支持: standalone（内置MongoDB） / external-mongo（外部MongoDB）

version: '3.8'

services:
  # ==================== MongoDB ====================
  mongodb:
    image: mongo:7-jammy
    container_name: dove-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: doves_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dove-net

  # ==================== 白鸽服务（Server + Doves 独立进程） ====================
  dove:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dove-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 覆盖 MongoDB 连接为 Docker 内部地址
      MONGODB: mongodb://doves_admin:${MONGO_PASSWORD:-changeme}@mongodb:27017/admin
      MONGODB_ADMIN_DB: doves_admin
      MONGODB_USER_DB: doves_user_data
      HOST: 0.0.0.0
      NODE_ENV: production
    ports:
      - "${PORT:-3100}:3100"
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3100/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dove-net

  # ==================== Mongo Express（可选，数据库管理面板） ====================
  mongo-express:
    image: mongo-express:1-20-alpine
    container_name: dove-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: doves_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://doves_admin:${MONGO_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD:-changeme}
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - debug  # 仅在 debug 模式启动
    networks:
      - dove-net

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  dove-net:
    driver: bridge
