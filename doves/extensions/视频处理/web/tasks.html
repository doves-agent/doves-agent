<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频任务列表</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { text-align: center; padding: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
  .stat-card .v { font-size: 24px; font-weight: 700; color: var(--primary); }
  .stat-card .l { font-size: 12px; color: var(--text-secondary); }
  .section h3 { font-size: 15px; margin-bottom: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center; }
  .task-item { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
  .task-item:last-child { border-bottom: none; }
  .task-item .status { padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; white-space: nowrap; }
  .task-item .info { flex: 1; }
  .task-item .info .name { font-size: 13px; font-weight: 600; color: var(--text); }
  .task-item .info .meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .status-done { background: #dafbe1; color: var(--success); }
  .status-active { background: #ddf4ff; color: var(--primary); }
  .status-queued { background: #fff8c5; color: var(--warning); }
  .status-fail { background: #ffebe9; color: var(--error); }
</style>
</head>
<body>
  <div class="page-header">
    <h1 class="page-title">视频任务列表</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="v" id="statTotal">-</div><div class="l">总任务</div></div>
    <div class="stat-card"><div class="v" id="statActive">-</div><div class="l">进行中</div></div>
    <div class="stat-card"><div class="v" id="statDone">-</div><div class="l">已完成</div></div>
  </div>

  <div class="card">
    <h3>最近处理的任务 <button class="btn btn-sm btn-outline" onclick="loadTasks()">刷新</button></h3>
    <div id="taskContainer">
      <div class="empty-state">暂无任务记录，请通过对话面板提交处理请求</div>
    </div>
  </div>

<script src="/js/sdk.js"></script>
<script>
DoveSDK.init('视频处理');

async function loadTasks() {
  try {
    const data = await DoveSDK.cmd('task list');
    if (data.success && data.data) {
      const tasks = Array.isArray(data.data) ? data.data : [];
      document.getElementById('statTotal').textContent = tasks.length;
      document.getElementById('statActive').textContent = tasks.filter(t => t.status === 'running' || t.status === 'pending').length;
      document.getElementById('statDone').textContent = tasks.filter(t => t.status === 'done' || t.status === 'completed').length;

      const container = document.getElementById('taskContainer');
      if (tasks.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无任务</div>';
        return;
      }
      container.innerHTML = tasks.slice(0, 10).map(t => {
        const statusClass = t.status === 'done' || t.status === 'completed' ? 'status-done' : t.status === 'running' ? 'status-active' : t.status === 'failed' ? 'status-fail' : 'status-queued';
        const statusLabel = t.status === 'done' || t.status === 'completed' ? '已完成' : t.status === 'running' ? '进行中' : t.status === 'failed' ? '失败' : '排队中';
        return '<div class="task-item"><span class="status ' + statusClass + '">' + statusLabel + '</span><div class="info"><div class="name">' + (t.title || t.description || '视频处理') + '</div><div class="meta">ID: ' + (t.id || t.taskId || '-') + ' | ' + (t.createdAt ? new Date(t.createdAt).toLocaleString() : '') + '</div></div></div>';
      }).join('');
    }
  } catch (e) {
    document.getElementById('taskContainer').innerHTML = '<div class="empty-state">加载失败: ' + e.message + '</div>';
  }
}

loadTasks();
</script>
</body>
</html>
