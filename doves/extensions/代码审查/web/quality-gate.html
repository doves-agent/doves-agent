<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>质量门禁</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .gate-result { text-align: center; padding: 30px; border-radius: var(--radius); margin-bottom: 16px; display: none; }
  .gate-pass { background: color-mix(in srgb, var(--success) 10%, var(--bg)); color: var(--success); }
  .gate-fail { background: color-mix(in srgb, var(--error) 10%, var(--bg)); color: var(--error); }
  .gate-score { font-size: 48px; font-weight: 700; }
  .gate-label { font-size: 14px; margin-top: 4px; opacity: 0.8; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat-item { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-item .value { font-size: 24px; font-weight: 700; color: var(--primary); }
  .stat-item .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .dim-table { width: 100%; border-collapse: collapse; }
  .dim-table th, .dim-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  .dim-table th { background: var(--bg-input); color: var(--text-secondary); font-weight: 600; }
  .pass-badge { background: color-mix(in srgb, var(--success) 15%, var(--bg)); color: var(--success); padding: 2px 8px; border-radius: var(--radius-sm); font-size: 12px; }
  .fail-badge { background: color-mix(in srgb, var(--error) 15%, var(--bg)); color: var(--error); padding: 2px 8px; border-radius: var(--radius-sm); font-size: 12px; }
  .trend-bar { display: flex; gap: 4px; margin: 12px 0; }
  .trend-dot { width: 24px; height: 24px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; }
  .trend-pass { background: var(--success); }
  .trend-fail { background: var(--error); }
  .config-display { background: var(--bg-input); padding: 12px; border-radius: var(--radius); overflow-x: auto; font-size: 12px; font-family: 'Consolas', monospace; white-space: pre-wrap; margin-top: 12px; display: none; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-header h3 { font-size: 15px; color: var(--text); margin: 0; }
</style>
</head>
<body>
  <div class="page-header">
    <h1 class="page-title">质量门禁</h1>
  </div>

  <div id="gateResult" class="gate-result gate-pass">
    <div class="gate-score" id="gateScore">-</div>
    <div class="gate-label" id="gateLabel">等待检查</div>
  </div>

  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-item"><div class="value" id="passRate">-</div><div class="label">通过率</div></div>
    <div class="stat-item"><div class="value" id="avgScore">-</div><div class="label">平均分</div></div>
    <div class="stat-item"><div class="value" id="totalChecks">-</div><div class="label">总检查次数</div></div>
  </div>

  <div class="card">
    <div class="section-header">
      <h3>门禁趋势</h3>
      <button class="btn btn-sm btn-outline" onclick="loadHistory()">刷新</button>
    </div>
    <div class="trend-bar" id="trendBar"></div>
    <table class="dim-table" id="dimTable">
      <thead><tr><th>维度</th><th>平均分</th><th>状态</th></tr></thead>
      <tbody><tr><td colspan="3" class="empty-state">加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <div class="section-header">
      <h3>门禁配置</h3>
      <button class="btn btn-sm btn-outline" onclick="loadConfig()">查看配置</button>
    </div>
    <pre id="configDisplay" class="config-display"></pre>
  </div>

<script src="/js/sdk.js"></script>
<script>
DoveSDK.init('代码审查');

async function callSkill(action, args = {}) {
  return DoveSDK.callSkill('quality_gate', action, args);
}

async function loadHistory() {
  try {
    const result = await callSkill('history', { limit: 20 });
    if (!result.success) return;
    const data = result.data;

    document.getElementById('statsRow').style.display = 'flex';
    document.getElementById('passRate').textContent = data.passRate + '%';
    document.getElementById('avgScore').textContent = data.avgScore;
    document.getElementById('totalChecks').textContent = data.totalChecks;

    const trendBar = document.getElementById('trendBar');
    trendBar.innerHTML = (data.trend || []).map(t =>
      `<div class="trend-dot ${t.pass ? 'trend-pass' : 'trend-fail'}" title="${t.time} - ${t.score}分">${t.pass ? '✓' : '✗'}</div>`
    ).join('');

    const dimTable = document.getElementById('dimTable');
    const dims = data.dimensionAverages || {};
    dimTable.innerHTML = `<thead><tr><th>维度</th><th>平均分</th><th>状态</th></tr></thead>
      <tbody>${Object.entries(dims).map(([dim, score]) =>
        `<tr><td>${dim}</td><td>${score}</td><td><span class="${score >= 70 ? 'pass-badge' : 'fail-badge'}">${score >= 70 ? '达标' : '需改进'}</span></td></tr>`
      ).join('')}</tbody>`;
  } catch (e) { console.error(e); }
}

async function loadConfig() {
  try {
    const result = await callSkill('config');
    if (result.success) {
      const pre = document.getElementById('configDisplay');
      pre.style.display = 'block';
      pre.textContent = JSON.stringify(result.data.config, null, 2);
    }
  } catch (e) { console.error(e); }
}

loadHistory();
</script>
</body>
</html>
