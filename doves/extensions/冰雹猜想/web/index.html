<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>冰雹猜想可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
  --text: #e4e4e7; --dim: #71717a; --accent: #6366f1;
  --even: #3b82f6; --odd: #ef4444; --green: #22c55e;
  --orange: #f59e0b; --purple: #a855f7; --f4x3: #ff79c6;
}
body { background: var(--bg); color: var(--text); font-family: 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 14px; min-height: 100vh; }
input, button, select { font-family: inherit; font-size: inherit; }
button { cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 6px 14px; border-radius: 6px; transition: all .15s; }
button:hover { border-color: var(--accent); background: #1e2130; }
button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
input, select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; outline: none; }
input:focus { border-color: var(--accent); }

#top-bar { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); }
#controls { padding: 10px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
#controls label { color: var(--dim); font-size: 11px; }
#controls .group { display: flex; align-items: center; gap: 6px; }
#controls .input-col { display: flex; flex-direction: column; gap: 2px; }
#controls .input-col input { padding: 4px 8px; font-size: 12px; }

#step-bar { padding: 6px 20px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
#step-bar label { color: var(--dim); font-size: 11px; white-space: nowrap; }
#step-slider { flex: 1; cursor: pointer; accent-color: var(--accent); height: 22px; }
#step-info { font-size: 12px; min-width: 90px; text-align: right; }

#zoom-bar { padding: 4px 20px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
#zoom-bar label { color: var(--dim); font-size: 11px; white-space: nowrap; }
#zoom-slider { width: 120px; cursor: pointer; accent-color: var(--green); }
#zoom-val { font-size: 11px; color: var(--dim); min-width: 40px; }

#num-tabs { padding: 6px 20px; display: flex; gap: 4px; flex-wrap: wrap; border-top: 1px solid var(--border); overflow-x: auto; }
#num-tabs:empty { display: none; padding: 0; }
#num-tabs button { font-size: 11px; padding: 3px 8px; border-radius: 4px; }

#panel-toggles { padding: 6px 20px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid var(--border); }
#panel-toggles button { font-size: 12px; padding: 4px 10px; }

#main { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; width: 100%; }
.panel-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.panel-header h3 { font-size: 13px; font-weight: 600; }
.panel-header .arrow { color: var(--dim); transition: transform .2s; }
.panel.collapsed .panel-body { display: none; }
.panel.collapsed .arrow { transform: rotate(-90deg); }
.panel-body { padding: 12px 14px; overflow: hidden; position: relative; display: flex; flex-direction: column; }

.panel-resize { height: 12px; cursor: ns-resize; background: transparent; border-top: 1px solid var(--border); transition: background .15s; position: relative; z-index: 10; }
.panel-resize::before { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 40px; height: 4px; border-radius: 2px; background: var(--border); }
.panel-resize:hover, .panel-resize.active { background: rgba(99,102,241,.15); }
.panel-resize:hover::before, .panel-resize.active::before { background: var(--accent); }

canvas { width: 100%; height: 280px; border-radius: 6px; display: block; }

.step-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.step-table th { position: sticky; top: 0; background: var(--surface); padding: 6px 8px; text-align: left; color: var(--dim); border-bottom: 1px solid var(--border); font-size: 11px; }
.step-table td { padding: 4px 8px; border-bottom: 1px solid #1f2233; white-space: nowrap; }
.step-table tr.is-odd { background: rgba(239,68,68,.06); }
.step-table tr.is-even { background: rgba(59,130,246,.06); }
.step-table tr.current { background: rgba(99,102,241,.35); box-shadow: inset 3px 0 0 var(--accent); }
.step-table tr[data-step]:hover:not(.current) { background: rgba(99,102,241,.1); }

.bit { display: inline-block; width: 11px; text-align: center; font-size: 11px; padding: 1px 0; border-radius: 2px; }
.bit.changed { background: rgba(99,102,241,.35); }
.bit.tail-0 { color: var(--even); font-weight: 700; }
.bit.tail-1 { color: var(--odd); font-weight: 700; }
.bit.tail-01 { color: var(--orange); font-weight: 700; }
.bit.tail-11 { color: var(--purple); font-weight: 700; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
.stat-card { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.stat-card .label { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
.stat-card .value { font-size: 18px; font-weight: 700; }

.heatmap-container { overflow-x: auto; }
.heatmap-row { display: flex; gap: 2px; margin-bottom: 2px; }
.heatmap-cell { width: 20px; height: 20px; border-radius: 3px; font-size: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; }
.heatmap-cell:hover { transform: scale(1.4); z-index: 10; position: relative; }

.scroll-body { flex: 1; min-height: 0; max-height: 50vh; overflow-y: auto; }
.scroll-body::-webkit-scrollbar { width: 6px; }
.scroll-body::-webkit-scrollbar-track { background: transparent; }
.scroll-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

#anim-group { display: flex; gap: 6px; align-items: center; }
#anim-group button { padding: 4px 8px; font-size: 11px; }

#trace-tip { position: fixed; z-index: 9999; pointer-events: none; background: #1e2130; border: 1px solid var(--accent); border-radius: 6px; padding: 8px 10px; font-size: 11px; line-height: 1.6; color: var(--text); max-width: 420px; white-space: pre-wrap; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.5); }
</style>
</head>
<body>

<div id="top-bar">
  <div id="controls">
    <div class="group">
      <div class="input-col">
        <label>起始(十进制)</label>
        <input id="in-dec" type="text" value="27" style="width:110px">
      </div>
    </div>
    <div class="group">
      <div class="input-col">
        <label>起始(二进制)</label>
        <input id="in-bin" type="text" value="11011" style="width:150px">
      </div>
    </div>
    <div class="group">
      <div class="input-col">
        <label>结束数</label>
        <input id="in-end" type="number" placeholder="留空=单数" min="1" style="width:90px">
      </div>
    </div>
    <button id="btn-run" class="active">计算</button>
    <div id="anim-group">
      <button id="btn-play">&#9654;</button>
      <button id="btn-pause" style="display:none">&#9646;&#9646;</button>
      <button id="btn-reset">&#9198;</button>
      <label>速度</label>
      <input id="speed-sl" type="range" min="1" max="30" value="10" style="width:60px;accent-color:var(--accent)">
    </div>
  </div>
  <div id="step-bar">
    <label>步骤</label>
    <input id="step-slider" type="range" min="0" max="1" value="1">
    <span id="step-info">0/0</span>
  </div>
  <div id="zoom-bar">
    <label>缩放</label>
    <input id="zoom-slider" type="range" min="50" max="200" value="100" step="10">
    <span id="zoom-val">100%</span>
  </div>
  <div id="num-tabs"></div>
  <div id="panel-toggles"></div>
</div>

<div id="trace-tip"></div>

<div id="main"></div>

<script>
const panels = [
  { id: 'trajectory', title: '轨迹曲线', full: true },
  { id: 'numberline', title: '数轴跳跃', full: true },
  { id: 'bitwidth', title: '位宽变化', full: true },
  { id: 'trace', title: '步骤追踪', full: true },
  { id: 'stats', title: '统计', full: true },
  { id: 'heatmap', title: '热力图', full: true },
  { id: 'coral', title: '珊瑚图', full: true },
  { id: 'mul3', title: '×3 错位相加', full: true },
];

const S = {
  seqs: new Map(),
  cur: null,
  step: 0,
  timer: null,
  playing: false,
  vis: {}, col: {},
  order: panels.map(p => p.id),
};
panels.forEach(p => { S.vis[p.id] = true; S.col[p.id] = false; });

const CC = new Map([[1n, [1n]]]);

function is4x3(n) { return typeof n === 'bigint' ? (n & 3n) === 3n : n % 4 === 3; }

function calc(n) {
  n = BigInt(n);
  if (CC.has(n)) return CC.get(n);
  const st = [];
  let c = n;
  while (!CC.has(c) && c !== 1n) { st.push(c); c = c & 1n ? 3n * c + 1n : c >> 1n; }
  let t = c === 1n ? [1n] : CC.get(c);
  for (let i = st.length - 1; i >= 0; i--) { t = [st[i], ...t]; CC.set(st[i], t); }
  return t;
}

// --- 输入同步 ---
const inDec = document.getElementById('in-dec');
const inBin = document.getElementById('in-bin');
let lock = false;
inDec.addEventListener('input', () => {
  if (lock) return; lock = true;
  const v = inDec.value.trim();
  if (/^\d+$/.test(v) && v !== '0') try { inBin.value = BigInt(v).toString(2); } catch(e) {}
  lock = false;
});
inBin.addEventListener('input', () => {
  if (lock) return; lock = true;
  const v = inBin.value.trim();
  if (/^[01]+$/.test(v)) try { inDec.value = BigInt('0b' + v).toString(); } catch(e) {}
  lock = false;
});
[inDec, inBin, document.getElementById('in-end')].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') run(); })
);

// --- 步骤条 ---
const stepSl = document.getElementById('step-slider');
const stepInf = document.getElementById('step-info');
stepSl.addEventListener('input', () => { S.step = +stepSl.value; syncStep(); render(); });

function syncStep() {
  const seq = S.seqs.get(S.cur);
  const mx = seq ? seq.length - 1 : 0;
  stepSl.max = mx;
  stepSl.value = S.step;
  stepInf.textContent = `${S.step} / ${mx}`;
}

// --- 数字 tabs ---
function buildTabs() {
  const box = document.getElementById('num-tabs');
  if (S.seqs.size <= 1) { box.innerHTML = ''; return; }
  let html = '';
  for (const n of S.seqs.keys()) {
    const cls = n === S.cur ? 'active' : '';
    html += `<button class="${cls}" onclick="pickNum(${n})">${n}</button>`;
  }
  box.innerHTML = html;
}

window.pickNum = function(n) {
  S.cur = n;
  const seq = S.seqs.get(n);
  S.step = seq ? seq.length - 1 : 0;
  stopAnim();
  syncStep();
  buildTabs();
  render();
};

// --- 面板 ---
function buildUI() {
  const tgl = document.getElementById('panel-toggles');
  const main = document.getElementById('main');
  tgl.innerHTML = ''; main.innerHTML = '';

  panels.forEach(p => {
    const b = document.createElement('button');
    b.textContent = p.title;
    b.className = S.vis[p.id] ? 'active' : '';
    b.onclick = () => {
      S.vis[p.id] = !S.vis[p.id];
      if (S.vis[p.id]) {
        S.order = S.order.filter(x => x !== p.id);
        S.order.push(p.id);
      }
      buildUI();
      requestAnimationFrame(render);
    };
    tgl.appendChild(b);
  });

  const ordered = S.order.filter(id => S.vis[id]);
  ordered.forEach(id => {
    const p = panels.find(x => x.id === id);
    const d = document.createElement('div');
    d.className = `panel${S.col[p.id] ? ' collapsed' : ''}`;
    d.id = `panel-${p.id}`;
    d.innerHTML = `<div class="panel-header"><h3>${p.title}</h3><span class="arrow">&#9660;</span></div><div class="panel-body" id="body-${p.id}"></div><div class="panel-resize" data-panel="${p.id}"></div>`;
    d.querySelector('.panel-header').onclick = () => {
      S.col[p.id] = !S.col[p.id];
      d.classList.toggle('collapsed');
      if (!S.col[p.id]) requestAnimationFrame(render);
    };
    main.appendChild(d);
  });

  // 拖拽调整面板高度
  main.querySelectorAll('.panel-resize').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      const panelId = handle.dataset.panel;
      const body = document.getElementById(`body-${panelId}`);
      if (!body) return;
      handle.classList.add('active');
      const startY = e.clientY;
      const startH = body.offsetHeight;
      const onMove = ev => {
        const newH = Math.max(80, startH + ev.clientY - startY);
        body.style.height = newH + 'px';
        const canvas = body.querySelector('canvas');
        if (canvas) {
          canvas.style.height = (newH - 24) + 'px';
          if (panelId === 'coral') drawCoral();
          else if (panelId === 'numberline') drawNumberline();
          else if (panelId === 'trajectory' || panelId === 'bitwidth') drawChart(panelId);
        }
      };
      const onUp = () => {
        handle.classList.remove('active');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  });

  ['trajectory', 'bitwidth', 'numberline'].forEach(id => {
    const b = document.getElementById(`body-${id}`);
    if (!b || b.querySelector('canvas')) return;
    const c = document.createElement('canvas'); c.id = `canvas-${id}`;
    c.style.cursor = id === 'numberline' ? 'grab' : 'crosshair';
    if (id === 'numberline') {
      c.style.height = '200px';
      setupNumberline(c);
    } else {
      c.addEventListener('click', e => onChartClick(id, e));
    }
    b.appendChild(c);
  });

  const coralBody = document.getElementById('body-coral');
  if (coralBody && !coralBody.querySelector('canvas')) {
    const ctrl = document.createElement('div');
    ctrl.style.cssText = 'margin-bottom:8px;display:flex;align-items:center;gap:8px;';
    ctrl.innerHTML = '<label style="color:var(--dim);font-size:11px;">展开层数</label><input id="coral-max" type="number" value="20" min="1" max="50" style="width:80px;padding:4px 8px;font-size:12px;"><button id="coral-draw" style="font-size:11px;padding:4px 10px;">绘制</button>';
    coralBody.appendChild(ctrl);
    const c = document.createElement('canvas'); c.id = 'canvas-coral';
    c.style.height = '600px';
    coralBody.appendChild(c);
    document.getElementById('coral-draw').onclick = renderCoral;
    document.getElementById('coral-max').addEventListener('keydown', e => { if (e.key === 'Enter') renderCoral(); });
  }

  const mul3Body = document.getElementById('body-mul3');
  if (mul3Body && !mul3Body.querySelector('#mul3-dec')) {
    mul3Body.innerHTML = `
      <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;">
        <label style="color:var(--dim);font-size:11px;">十进制</label>
        <input id="mul3-dec" type="text" value="27" style="width:110px;padding:4px 8px;font-size:12px;">
        <label style="color:var(--dim);font-size:11px;">二进制</label>
        <input id="mul3-bin" type="text" value="11011" style="width:180px;padding:4px 8px;font-size:12px;">
        <button id="mul3-calc" style="font-size:11px;padding:4px 10px;">计算</button>
      </div>
      <div id="mul3-result" class="scroll-body" style="font-size:12px;"></div>`;
    const m3dec = document.getElementById('mul3-dec');
    const m3bin = document.getElementById('mul3-bin');
    let m3lock = false;
    m3dec.addEventListener('input', () => {
      if (m3lock) return; m3lock = true;
      const v = m3dec.value.trim();
      if (/^\d+$/.test(v) && v !== '0') try { m3bin.value = BigInt(v).toString(2); } catch(e) {}
      m3lock = false;
    });
    m3bin.addEventListener('input', () => {
      if (m3lock) return; m3lock = true;
      const v = m3bin.value.trim();
      if (/^[01]+$/.test(v)) try { m3dec.value = BigInt('0b' + v).toString(); } catch(e) {}
      m3lock = false;
    });
    document.getElementById('mul3-calc').onclick = renderMul3;
    [m3dec, m3bin].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') renderMul3(); }));
  }
}

// --- 运行 ---
function run() {
  const dv = inDec.value.trim();
  let sv = /^\d+$/.test(dv) ? parseInt(dv) : 27;
  if (sv < 1) sv = 1;
  const ev = parseInt(document.getElementById('in-end').value) || sv;
  const a = Math.min(sv, ev), b = Math.max(sv, ev);

  S.seqs.clear();
  for (let i = a; i <= b && i - a < 1000; i++) S.seqs.set(i, calc(i));
  S.cur = sv >= a && sv <= b ? sv : a;
  const seq = S.seqs.get(S.cur);
  S.step = seq ? seq.length - 1 : 0;
  stopAnim();
  syncStep();
  buildTabs();
  render();
}

function render() {
  drawChart('trajectory');
  drawChart('bitwidth');
  drawNumberline();
  renderTrace();
  renderStats();
  renderHeatmap();
  renderCoral();
}

// --- 图表 ---
const chartMeta = {};

function drawChart(type) {
  const canvas = document.getElementById(`canvas-${type}`);
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 20 || rect.height < 20) return;
  const dpr = devicePixelRatio || 1;
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const seq = S.seqs.get(S.cur);
  if (!seq) return;

  const isBit = type === 'bitwidth';
  let vals;
  if (isBit) {
    vals = seq.map(v => v.toString(2).length);
  } else {
    const useLog = seq.some(v => v > 10000n);
    vals = seq.map(v => useLog ? Math.log2(Number(v) + 1) : Number(v));
    vals._log = useLog;
  }

  const maxV = Math.max(...vals), minV = Math.min(...vals);
  const steps = vals.length;
  const pL = 55, pR = 20, pT = 16, pB = 26;
  const gW = W - pL - pR, gH = H - pT - pB;

  chartMeta[type] = { pL, pR, pT, pB, gW, gH, steps, W, H };

  ctx.strokeStyle = '#2a2d3a'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pT + gH * i / 4;
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(W - pR, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    const lbl = Math.round(maxV * (1 - i / 4));
    ctx.fillText(isBit ? `${lbl}b` : (vals._log ? `2^${lbl}` : lbl.toString()), pL - 5, y + 3);
  }

  const xOf = i => pL + (steps > 1 ? i / (steps - 1) * gW : gW / 2);
  const yOf = i => pT + gH - (maxV > 0 ? vals[i] / maxV * gH : 0);

  ctx.beginPath();
  ctx.strokeStyle = isBit ? 'rgba(34,197,94,.6)' : 'rgba(99,102,241,.6)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < steps; i++) { i === 0 ? ctx.moveTo(xOf(i), yOf(i)) : ctx.lineTo(xOf(i), yOf(i)); }
  ctx.stroke();

  if (steps <= 300) {
    for (let i = 0; i < steps; i++) {
      ctx.beginPath(); ctx.arc(xOf(i), yOf(i), 2.5, 0, Math.PI * 2);
      const v = seq[i];
      if (is4x3(v)) ctx.fillStyle = 'rgba(255,121,198,.85)';
      else ctx.fillStyle = v & 1n ? 'rgba(239,68,68,.7)' : 'rgba(59,130,246,.7)';
      ctx.fill();
    }
  }

  if (S.step < steps) {
    ctx.beginPath(); ctx.arc(xOf(S.step), yOf(S.step), 6, 0, Math.PI * 2);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  }

  ctx.fillStyle = '#666'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  const info = isBit ? `位宽 ${minV}~${maxV}b  当前第${S.step}步=${vals[S.step]}b` : `总${steps-1}步  当前第${S.step}步=${seq[S.step]}${vals._log ? ' (log)' : ''}`;
  ctx.fillText(info, W / 2, H - 4);
}

function chartClickToStep(type, e) {
  const m = chartMeta[type];
  if (!m) return -1;
  const canvas = document.getElementById(`canvas-${type}`);
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < m.pL || x > m.W - m.pR) return -1;
  const ratio = (x - m.pL) / m.gW;
  const step = Math.round(ratio * (m.steps - 1));
  return Math.max(0, Math.min(m.steps - 1, step));
}

function onChartClick(type, e) {
  const step = chartClickToStep(type, e);
  if (step < 0) return;
  jumpToStep(step);
}

function jumpToStep(step) {
  const seq = S.seqs.get(S.cur);
  if (!seq) return;
  S.step = Math.max(0, Math.min(seq.length - 1, step));
  syncStep();
  render();
}

// --- 合并追踪表 ---
let traceFilter = 'all'; // 'all' | 'odd' | 'even' | 'custom'
let traceCustomSuffix = '';

function renderTrace() {
  const body = document.getElementById('body-trace');
  if (!body) return;
  const seq = S.seqs.get(S.cur);
  if (!seq) { body.innerHTML = '<p style="color:var(--dim)">无数据</p>'; return; }

  const vis = seq.length;
  const maxBits = Math.max(...seq.map(v => v.toString(2).length));

  let html = '<div style="margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><label style="font-size:11px;color:var(--dim);">筛选</label><select id="trace-filter" style="font-size:11px;padding:2px 6px;">';
  const filterOpts = [
    ['all', '显示全部'], ['odd', '仅奇数'], ['even', '仅偶数'],
    ['t00', '末尾00'], ['t10', '末尾10'], ['t01', '末尾01'], ['t11', '末尾11'],
    ['custom', '自定义末尾']
  ];
  for (const [val, label] of filterOpts) {
    html += `<option value="${val}"${traceFilter === val ? ' selected' : ''}>${label}</option>`;
  }
  html += '</select>';
  if (traceFilter === 'custom') {
    html += `<input id="trace-custom-suffix" type="text" placeholder="输入二进制后缀如 101" value="${traceCustomSuffix}" style="font-size:11px;padding:2px 6px;width:100px;font-family:monospace;">`;
  }
  html += '</div>';

  html += '<div class="scroll-body"><table class="step-table"><thead><tr>';
  html += '<th>#</th><th>显示步骤</th><th>十进制</th><th>后续操作</th><th>二进制</th><th>位宽</th><th>末尾模式</th>';
  html += '</tr></thead><tbody>';

  let displayStep = 0;
  let prevVisibleStep = -1;
  for (let i = 0; i < vis; i++) {
    const v = seq[i];
    const bin = v.toString(2);
    const isOdd = v & 1n;

    const finalSeq = new Set([16n, 8n, 4n, 2n, 1n]);
    const forceShow = finalSeq.has(v);
    if (!forceShow && traceFilter === 'odd' && !isOdd && i > 0) continue;
    if (!forceShow && traceFilter === 'even' && isOdd && i > 0) continue;
    if (!forceShow && traceFilter === 't00' && !bin.endsWith('00') && i > 0) continue;
    if (!forceShow && traceFilter === 't10' && !bin.endsWith('10') && i > 0) continue;
    if (!forceShow && traceFilter === 't01' && !bin.endsWith('01') && i > 0) continue;
    if (!forceShow && traceFilter === 't11' && !bin.endsWith('11') && i > 0) continue;
    if (!forceShow && traceFilter === 'custom' && traceCustomSuffix && !bin.endsWith(traceCustomSuffix) && i > 0) continue;

    const prevBin = prevVisibleStep >= 0 ? seq[prevVisibleStep].toString(2) : '';
    const padded = bin.padStart(maxBits, '0');
    const prevPad = prevBin.padStart(maxBits, '0');
    const cls = i === S.step ? 'current' : (isOdd ? 'is-odd' : 'is-even');

    const op = i === vis - 1 ? '<span style="color:var(--green)">到达1</span>' : (isOdd ? '<span style="color:var(--odd)">&times;3+1</span>' : '<span style="color:var(--even)">&divide;2</span>');

    const trailing0 = bin.length - bin.replace(/0+$/, '').length;
    const trailing1 = bin.length - bin.replace(/1+$/, '').length;
    let tail = '';
    if (trailing0 >= 2) tail = `<span style="color:var(--even)">...${'0'.repeat(trailing0)}</span> ÷${Math.pow(2, trailing0)}`;
    else if (trailing1 >= 2) tail = `<span style="color:var(--purple)">...${'1'.repeat(trailing1)}</span>`;
    else if (bin.endsWith('01')) tail = '<span style="color:var(--orange)">...01</span>';
    else if (bin.endsWith('0')) tail = '<span style="color:var(--even)">...0</span>';
    else tail = '<span style="color:var(--odd)">...1</span>';

    let bitsHtml = '';
    for (let j = 0; j < padded.length; j++) {
      const ch = padded[j];
      const chg = i > 0 && j < prevPad.length && prevPad[j] !== ch;
      const tp = padded.length - j;
      let tc = '';
      if (trailing0 >= 1 && tp <= trailing0) tc = 'tail-0';
      else if (trailing1 >= 1 && tp <= trailing1) tc = 'tail-11';
      bitsHtml += `<span class="bit${chg ? ' changed' : ''}${tc ? ' ' + tc : ''}">${ch}</span>`;
    }

    const bw = bin.length;
    const wd = i > 0 ? bw - seq[i-1].toString(2).length : 0;
    const ws = wd > 0 ? `${bw}<span style="color:var(--odd)">+${wd}</span>` : wd < 0 ? `${bw}<span style="color:var(--green)">${wd}</span>` : `${bw}`;

    const decStr = v.toString();
    const decHtml = is4x3(v) ? `<span style="color:var(--f4x3);font-weight:700" title="4x+3">${decStr}</span>` : decStr;
    html += `<tr class="${cls}" data-step="${i}" data-prev-step="${prevVisibleStep}" style="cursor:pointer"><td>${i}</td><td>${displayStep}</td><td>${decHtml}</td><td>${op}</td><td>${bitsHtml}</td><td>${ws}</td><td>${tail}</td></tr>`;
    prevVisibleStep = i;
    displayStep++;
  }
  html += '</tbody></table></div>';
  const prevSd = body.querySelector('.scroll-body');
  const prevScroll = prevSd ? prevSd.scrollTop : 0;
  const prevCursor = document.getElementById('trace-custom-suffix');
  const prevCursorPos = prevCursor ? prevCursor.selectionStart : -1;

  body.innerHTML = html;

  document.getElementById('trace-filter').addEventListener('change', e => {
    traceFilter = e.target.value;
    renderTrace();
  });

  const customInput = document.getElementById('trace-custom-suffix');
  if (customInput) {
    customInput.addEventListener('input', e => {
      traceCustomSuffix = e.target.value.replace(/[^01]/g, '');
      renderTrace();
    });
    customInput.focus();
    if (prevCursorPos >= 0) customInput.selectionStart = customInput.selectionEnd = prevCursorPos;
  }

  const sd = body.querySelector('.scroll-body');
  if (sd) {
    sd.scrollTop = prevScroll;
    sd.addEventListener('click', e => {
      const tr = e.target.closest('tr[data-step]');
      if (tr) jumpToStep(+tr.dataset.step);
    });

    const tip = document.getElementById('trace-tip');
    sd.addEventListener('mousemove', e => {
      const tr = e.target.closest('tr[data-step]');
      if (!tr) { tip.style.display = 'none'; return; }
      const step = +tr.dataset.step;
      const prevStep = +tr.dataset.prevStep;
      if (prevStep < 0 || step - prevStep <= 1) { tip.style.display = 'none'; return; }
      const seq = S.seqs.get(S.cur);
      if (!seq) { tip.style.display = 'none'; return; }
      let lines = [];
      for (let k = prevStep; k <= step; k++) {
        const val = seq[k];
        const nextOp = k < seq.length - 1 ? (val & 1n ? '→×3+1' : '→÷2') : '';
        const hidden = (k > prevStep && k < step);
        const prefix = hidden ? '  ' : '▸ ';
        const rawBin = val.toString(2);
        const padLen = Math.ceil(rawBin.length / 4) * 4;
        const binStr = rawBin.padStart(padLen, '0').replace(/(.{4})/g, '$1 ').trim();
        lines.push(`${prefix}#${k}  ${val.toString()}  (${binStr})  ${nextOp}`);
      }
      tip.textContent = lines.join('\n');
      tip.style.display = 'block';
      tip.style.left = (e.clientX + 12) + 'px';
      tip.style.top = (e.clientY + 12) + 'px';
    });
    sd.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

    const cur = sd.querySelector('tr.current');
    if (cur) {
      const sdRect = sd.getBoundingClientRect();
      const curRect = cur.getBoundingClientRect();
      if (curRect.top < sdRect.top || curRect.bottom > sdRect.bottom) {
        sd.scrollTop += curRect.top - sdRect.top - sd.clientHeight / 2 + cur.offsetHeight / 2;
      }
    }
  }
}

function renderStats() {
  const body = document.getElementById('body-stats');
  if (!body) return;
  const seq = S.seqs.get(S.cur);
  if (!seq) { body.innerHTML = ''; return; }

  const tot = seq.length - 1;
  const mx = seq.reduce((a, b) => a > b ? a : b, 0n);
  const mxi = seq.indexOf(mx);
  const oddC = seq.filter(v => v & 1n).length;
  const evenC = seq.length - oddC;
  let mce = 0, mco = 0, c = 0, ct = null;
  for (const v of seq) { const t = v & 1n ? 'o' : 'e'; if (t === ct) c++; else { c = 1; ct = t; } if (t === 'o') mco = Math.max(mco, c); else mce = Math.max(mce, c); }
  let st = 'N/A';
  for (let i = 1; i < seq.length; i++) { if (seq[i] < seq[0]) { st = i; break; } }

  body.innerHTML = `<div class="stats-grid">
    <div class="stat-card"><div class="label">总步数</div><div class="value">${tot}</div></div>
    <div class="stat-card"><div class="label">最大值</div><div class="value" style="font-size:13px">${mx.toString()}</div></div>
    <div class="stat-card"><div class="label">峰值位置</div><div class="value">第${mxi}步</div></div>
    <div class="stat-card"><div class="label">停止时间</div><div class="value">${st}</div></div>
    <div class="stat-card"><div class="label">奇数步</div><div class="value" style="color:var(--odd)">${oddC}</div></div>
    <div class="stat-card"><div class="label">偶数步</div><div class="value" style="color:var(--even)">${evenC}</div></div>
    <div class="stat-card"><div class="label">最长连续偶(坠)</div><div class="value" style="color:var(--even)">${mce}</div></div>
    <div class="stat-card"><div class="label">最长连续奇(升)</div><div class="value" style="color:var(--odd)">${mco}</div></div>
  </div>`;
}

function renderHeatmap() {
  const body = document.getElementById('body-heatmap');
  if (!body) return;
  if (S.seqs.size <= 1) { body.innerHTML = '<p style="color:var(--dim)">输入结束数启用热力图</p>'; return; }

  const arr = [...S.seqs.entries()].map(([k, v]) => ({ n: k, s: v.length - 1 }));
  const maxS = Math.max(...arr.map(x => x.s)), minS = Math.min(...arr.map(x => x.s));
  const cols = Math.min(30, arr.length);
  let html = '<div class="heatmap-container">';
  for (let i = 0; i < arr.length; i += cols) {
    html += '<div class="heatmap-row">';
    for (let j = i; j < Math.min(i + cols, arr.length); j++) {
      const { n, s } = arr[j];
      const r = maxS > minS ? (s - minS) / (maxS - minS) : 0;
      const R = Math.round(59 + r * 180), G = Math.round(130 - r * 62), B = Math.round(246 - r * 178);
      const sel = n === S.cur ? ';outline:2px solid #fff' : '';
      const f4x3Style = is4x3(n) ? ';box-shadow:inset 0 0 0 2px #ff79c6' : '';
      html += `<div class="heatmap-cell" style="background:rgb(${R},${G},${B})${sel}${f4x3Style}" onclick="pickNum(${n})" title="${n}: ${s}步${is4x3(n) ? ' [4x+3]' : ''}">${n}</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

// --- ×3 错位相加 ---
function renderMul3() {
  const box = document.getElementById('mul3-result');
  if (!box) return;
  const decInput = document.getElementById('mul3-dec');
  const v = decInput ? decInput.value.trim() : '27';
  let n;
  try { n = BigInt(v); } catch(e) { box.innerHTML = '<p style="color:var(--odd)">无效输入</p>'; return; }
  if (n < 1n) { box.innerHTML = '<p style="color:var(--odd)">请输入正整数</p>'; return; }

  const binN = n.toString(2);
  const shifted = (n << 1n).toString(2);
  const resultPlus1 = n * 3n + 1n;
  const resultPlus1Bin = resultPlus1.toString(2);

  // 对齐位宽
  const maxLen = resultPlus1Bin.length;
  const padN = binN.padStart(maxLen, '0');
  const padShifted = shifted.padStart(maxLen, '0');
  const padResultP1 = resultPlus1Bin.padStart(maxLen, '0');

  // 4位一组格式化
  function fmt4(s) {
    const full = s.padStart(Math.ceil(s.length / 4) * 4, '0');
    return full.replace(/(.{4})/g, '$1 ').trim();
  }

  const binTd = 'text-align:right;letter-spacing:1px;';
  let html = '<div style="font-family:monospace;line-height:1.8;">';
  html += '<table style="border-collapse:collapse;font-size:12px;">';
  html += `<tr><td style="color:var(--dim);padding-right:12px;">N</td><td style="${binTd}">${fmt4(padN)}</td><td style="color:var(--dim);padding-left:12px;">${n.toString()}</td></tr>`;
  html += `<tr><td style="color:var(--dim);padding-right:12px;">N&lt;&lt;1</td><td style="${binTd}border-bottom:1px solid var(--border);">${fmt4(padShifted)}</td><td style="color:var(--dim);padding-left:12px;">${(n * 2n).toString()}</td></tr>`;
  html += `<tr><td style="color:var(--green);padding-right:12px;font-weight:700;">N×3+1</td><td style="${binTd}color:var(--green);font-weight:700;">${fmt4(padResultP1)}</td><td style="color:var(--green);padding-left:12px;font-weight:700;">${resultPlus1.toString()}</td></tr>`;

  // 末尾零
  const tz = resultPlus1Bin.length - resultPlus1Bin.replace(/0+$/, '').length;
  if (tz > 0) {
    const afterDiv = resultPlus1 >> BigInt(tz);
    html += `<tr><td style="color:var(--even);padding-right:12px;">÷${Math.pow(2, tz)}</td><td style="${binTd}color:var(--even);">${fmt4(afterDiv.toString(2))}</td><td style="color:var(--even);padding-left:12px;">${afterDiv.toString()}${Number(afterDiv) < Number(n) ? ' <span style="color:var(--green)">(&lt;N ✓)</span>' : ' <span style="color:var(--odd)">(&gt;N)</span>'}</td></tr>`;
  }
  html += '</table>';
  html += '</div>';
  box.innerHTML = html;
}

// --- 珊瑚图 ---
const coralState = { zoom: 1, panX: 0, panY: 0, dragging: false, lastX: 0, lastY: 0, data: null, hoverNode: null };

function setupCoralInteraction() {
  const canvas = document.getElementById('canvas-coral');
  if (!canvas || canvas._coralBound) return;
  canvas._coralBound = true;
  canvas.style.cursor = 'grab';

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const oldZoom = coralState.zoom;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    coralState.zoom = Math.max(0.2, Math.min(20, coralState.zoom * factor));
    const ratio = coralState.zoom / oldZoom;
    coralState.panX = mx - ratio * (mx - coralState.panX);
    coralState.panY = my - ratio * (my - coralState.panY);
    drawCoral();
  }, { passive: false });

  canvas.addEventListener('mousedown', e => {
    coralState.dragging = true;
    coralState.lastX = e.clientX;
    coralState.lastY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (coralState.dragging) {
      coralState.panX += e.clientX - coralState.lastX;
      coralState.panY += e.clientY - coralState.lastY;
      coralState.lastX = e.clientX;
      coralState.lastY = e.clientY;
      drawCoral();
      return;
    }
    // hover 检测
    if (!coralState.data) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const lx = (mx - coralState.panX) / coralState.zoom;
    const ly = (my - coralState.panY) / coralState.zoom;
    const { pos, maxN } = coralState.data;
    const hitR = Math.max(8, 12 / coralState.zoom);
    let found = null;
    for (const [n, { x, y }] of pos) {
      const dx = lx - x, dy = ly - y;
      if (dx * dx + dy * dy < hitR * hitR) { found = n; break; }
    }
    if (found !== coralState.hoverNode) {
      coralState.hoverNode = found;
      drawCoral();
    }
  });
  window.addEventListener('mouseup', () => {
    if (coralState.dragging) {
      coralState.dragging = false;
      const c = document.getElementById('canvas-coral');
      if (c) c.style.cursor = 'grab';
    }
  });
}

function renderCoral() {
  const canvas = document.getElementById('canvas-coral');
  if (!canvas) return;
  const maxInput = document.getElementById('coral-max');
  const maxLevels = maxInput ? Math.max(1, Math.min(50, parseInt(maxInput.value) || 20)) : 20;

  // 从 1 出发反向 BFS 展开
  // 反向前驱：n 的前驱为 2n（始终）和 (n-1)/3（当 (n-1)%3===0 且 (n-1)/3 为奇数且 >1）
  const children = new Map();
  const parentMap = new Map();
  const levels = [[1]];
  const visited = new Set([1]);
  children.set(1, []);

  for (let depth = 0; depth < maxLevels; depth++) {
    const curLevel = levels[depth];
    const nextLevel = [];
    for (const n of curLevel) {
      const preds = [];
      // 前驱 1: 2n
      preds.push(2 * n);
      // 前驱 2: (n-1)/3 如果合法
      if ((n - 1) % 3 === 0) {
        const p2 = (n - 1) / 3;
        if (p2 > 1 && p2 % 2 === 1) preds.push(p2);
      }
      for (const p of preds) {
        if (!visited.has(p)) {
          visited.add(p);
          if (!children.has(n)) children.set(n, []);
          children.get(n).push(p);
          if (!children.has(p)) children.set(p, []);
          parentMap.set(p, n);
          nextLevel.push(p);
        }
      }
    }
    if (nextLevel.length === 0) break;
    levels.push(nextLevel);
  }

  const totalLevels = levels.length;
  if (totalLevels === 0) return;

  // 布局：1 在底部，层数越深越往上；水平按同层均匀分布
  const maxLevelSize = levels.reduce((a, l) => Math.max(a, l.length), 0);
  const logicW = Math.max(1200, maxLevelSize * 28);
  const logicH = Math.max(600, totalLevels * 50);
  const marginL = 20, marginR = 20, marginT = 30, marginB = 40;
  const layerH = (logicH - marginT - marginB) / Math.max(totalLevels - 1, 1);

  const pos = new Map();
  for (let li = 0; li < totalLevels; li++) {
    const lev = levels[li];
    const y = logicH - marginB - li * layerH; // 第0层(1)在底部
    const count = lev.length;
    for (let ni = 0; ni < count; ni++) {
      const x = marginL + (ni + 0.5) * (logicW - marginL - marginR) / count;
      pos.set(lev[ni], { x, y });
    }
  }

  const nodeCount = visited.size;
  coralState.data = { pos, children, levels, totalLevels, nodeCount, logicW, logicH, parentMap };

  // 重置视图适配画布
  const rect = canvas.getBoundingClientRect();
  const W = rect.width || 800, H = rect.height || 600;
  const scaleX = W / logicW, scaleY = H / logicH;
  const fitScale = Math.min(scaleX, scaleY) * 0.95;
  coralState.zoom = fitScale;
  coralState.panX = (W - logicW * fitScale) / 2;
  coralState.panY = (H - logicH * fitScale) / 2;

  setupCoralInteraction();
  drawCoral();
}

function drawCoral() {
  const canvas = document.getElementById('canvas-coral');
  if (!canvas || !coralState.data) return;
  const { pos, children, levels, totalLevels, nodeCount, logicW, logicH, parentMap } = coralState.data;

  const rect = canvas.getBoundingClientRect();
  const W = rect.width || 800, H = rect.height || 600;
  const dpr = devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#0f1117'; ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(coralState.panX, coralState.panY);
  ctx.scale(coralState.zoom, coralState.zoom);

  // 计算高亮集合 + hover 节点所在层
  const hlNodes = new Set();
  const hlEdges = new Set();
  const hn = coralState.hoverNode;
  let hoverLevel = -1;
  if (hn !== null && pos.has(hn)) {
    // 找到 hover 节点所在层
    for (let li = 0; li < totalLevels; li++) {
      if (levels[li].includes(hn)) { hoverLevel = li; break; }
    }
    // 向根方向回溯
    let cur = hn;
    while (cur !== 1) {
      hlNodes.add(cur);
      const p = parentMap.get(cur);
      if (p !== undefined && pos.has(p)) {
        hlEdges.add(`${cur}-${p}`);
        cur = p;
      } else break;
    }
    if (cur === 1) hlNodes.add(1);
    // 向叶子方向展开所有后代
    const stack = [hn];
    while (stack.length > 0) {
      const n = stack.pop();
      hlNodes.add(n);
      const ch = children.get(n) || [];
      for (const c of ch) {
        hlEdges.add(`${c}-${n}`);
        stack.push(c);
      }
    }
  }

  // 同层节点集合
  const sameLevelNodes = hoverLevel >= 0 ? new Set(levels[hoverLevel]) : new Set();

  // 画连线：每个节点连向其父节点
  ctx.lineWidth = 0.6 / coralState.zoom;
  for (const [n, nPos] of pos) {
    if (n === 1) continue;
    const p = parentMap.get(n);
    if (p === undefined || !pos.has(p)) continue;
    const pPos = pos.get(p);
    const edgeKey = `${n}-${p}`;
    const isHl = hlEdges.has(edgeKey);
    if (isHl) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2 / coralState.zoom;
    } else {
      const isOdd = n % 2 !== 0;
      ctx.strokeStyle = isOdd ? 'rgba(239,68,68,.3)' : 'rgba(59,130,246,.3)';
      ctx.lineWidth = 0.6 / coralState.zoom;
    }
    ctx.beginPath();
    const midY = (nPos.y + pPos.y) / 2;
    ctx.moveTo(nPos.x, nPos.y);
    ctx.bezierCurveTo(nPos.x, midY, pPos.x, midY, pPos.x, pPos.y);
    ctx.stroke();
  }

  // 画节点
  const nodeR = nodeCount <= 100 ? 4 : nodeCount <= 300 ? 2.5 : nodeCount <= 1000 ? 1.5 : 1;
  for (const [n, { x, y }] of pos) {
    const ch = children.get(n) || [];
    const isLeaf = ch.length === 0;
    const isHl = hlNodes.has(n);
    const r = isHl ? nodeR * 1.8 : (isLeaf ? nodeR * 1.3 : nodeR);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    if (n === 1) ctx.fillStyle = '#22c55e';
    else if (is4x3(n)) ctx.fillStyle = '#ff79c6';
    else if (isLeaf) ctx.fillStyle = '#f59e0b';
    else ctx.fillStyle = n % 2 !== 0 ? 'rgba(239,68,68,.8)' : 'rgba(59,130,246,.8)';
    ctx.fill();
    if (isHl) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5 / coralState.zoom;
      ctx.stroke();
    }
  }

  // 标注节点：高亮和同层节点显示"数字 (二进制)"
  const fontSize = Math.max(6, Math.min(12, 10 / coralState.zoom));
  const hlFontSize = Math.max(10, Math.min(16, 14 / coralState.zoom));
  ctx.textAlign = 'left';
  for (const [n, { x, y }] of pos) {
    const ch = children.get(n) || [];
    const isLeaf = ch.length === 0;
    const isHl = hlNodes.has(n);
    const isSameLevel = sameLevelNodes.has(n);
    const showBin = isHl || isSameLevel;
    const label = showBin ? `${n} (${n.toString(2)})` : n.toString();
    if (isHl) {
      ctx.font = `bold ${hlFontSize}px monospace`;
      ctx.fillStyle = '#fff';
    } else if (isSameLevel) {
      ctx.font = `bold ${fontSize}px monospace`;
      ctx.fillStyle = '#e4e4e7';
    } else {
      ctx.font = `${fontSize}px monospace`;
      if (n === 1) ctx.fillStyle = '#22c55e';
      else if (is4x3(n)) ctx.fillStyle = '#ff79c6';
      else if (isLeaf) ctx.fillStyle = '#f59e0b';
      else ctx.fillStyle = n % 2 !== 0 ? 'rgba(239,68,68,.9)' : 'rgba(100,160,255,.9)';
    }
    ctx.fillText(label, x + nodeR + 2, y + (isHl ? hlFontSize : fontSize) / 3);
  }

  ctx.restore();

  // 底部信息
  ctx.fillStyle = '#666'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(`珊瑚图: ${totalLevels}层  节点${nodeCount}个  滚轮缩放/拖拽平移`, W / 2, H - 6);
}

// --- 数轴跳跃 ---
const nlState = { offsetX: 60, scale: 4, dragging: false, startX: 0, startOff: 0, hoverArc: -1, arcs: [], _bindOnce: false };

function setupNumberline(canvas) {
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const numAtMouse = (mouseX - nlState.offsetX) / nlState.scale;
    const factor = e.deltaY < 0 ? 1.15 : 0.87;
    nlState.scale = Math.max(0.05, Math.min(200, nlState.scale * factor));
    nlState.offsetX = mouseX - numAtMouse * nlState.scale;
    drawNumberline();
  }, { passive: false });

  canvas.addEventListener('mousedown', e => {
    nlState.dragging = true;
    nlState.startX = e.clientX;
    nlState.startOff = nlState.offsetX;
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('mousemove', e => {
    if (nlState.dragging) return;
    const rect = canvas.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    if (W < 20 || H < 20) return;
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const AXIS_Y = H * 0.5;
    const seq = S.seqs.get(S.cur);
    if (!seq) return;
    const numSeq = seq.map(v => Number(v));
    const visSteps = Math.min(numSeq.length, S.step + 1);
    const numToX = n => nlState.offsetX + n * nlState.scale;

    let best = -1, bestDist = 18;
    for (let i = 0; i < visSteps - 1; i++) {
      const from = numSeq[i], to = numSeq[i + 1];
      const x1 = numToX(from), x2 = numToX(to);
      const goingUp = to > from;
      const dist = Math.abs(x2 - x1);
      const arcH = Math.min((H / 2) - 14, 16 + dist * 0.22);
      const midX = (x1 + x2) / 2;
      const cpY = goingUp ? AXIS_Y - arcH : AXIS_Y + arcH;
      for (let s = 0; s <= 10; s++) {
        const t = s / 10;
        const px = (1-t)*(1-t)*x1 + 2*(1-t)*t*midX + t*t*x2;
        const py = (1-t)*(1-t)*AXIS_Y + 2*(1-t)*t*cpY + t*t*AXIS_Y;
        const d = Math.hypot(px - mx, py - my);
        if (d < bestDist) { bestDist = d; best = i; }
      }
    }
    if (best !== nlState.hoverArc) {
      nlState.hoverArc = best;
      drawNumberline();
    }
  });
  canvas.addEventListener('mouseleave', () => {
    if (nlState.hoverArc !== -1) { nlState.hoverArc = -1; drawNumberline(); }
  });
  canvas.addEventListener('click', e => {
    if (nlState.hoverArc >= 0) {
      jumpToStep(nlState.hoverArc + 1);
    }
  });

  if (!nlState._bindOnce) {
    nlState._bindOnce = true;
    window.addEventListener('mousemove', e => {
      if (!nlState.dragging) return;
      const c = document.getElementById('canvas-numberline');
      if (!c) return;
      nlState.offsetX = nlState.startOff + (e.clientX - nlState.startX);
      drawNumberline();
    });
    window.addEventListener('mouseup', () => {
      if (nlState.dragging) {
        nlState.dragging = false;
        const c = document.getElementById('canvas-numberline');
        if (c) c.style.cursor = 'grab';
      }
    });
  }

  // touch
  let lastPinch = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      nlState.dragging = true;
      nlState.startX = e.touches[0].clientX;
      nlState.startOff = nlState.offsetX;
    } else if (e.touches.length === 2) {
      nlState.dragging = false;
      lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && nlState.dragging) {
      nlState.offsetX = nlState.startOff + (e.touches[0].clientX - nlState.startX);
      drawNumberline();
    } else if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const rect = canvas.getBoundingClientRect();
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const numAtMid = (midX - nlState.offsetX) / nlState.scale;
      nlState.scale *= d / lastPinch;
      nlState.scale = Math.max(0.05, Math.min(200, nlState.scale));
      nlState.offsetX = midX - numAtMid * nlState.scale;
      lastPinch = d;
      drawNumberline();
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { nlState.dragging = false; });
}

function drawNumberline() {
  nlState.arcs = [];
  const canvas = document.getElementById('canvas-numberline');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 20 || rect.height < 20) return;
  const dpr = devicePixelRatio || 1;
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const AXIS_Y = H * 0.5;

  const seq = S.seqs.get(S.cur);
  if (!seq) return;
  const numSeq = seq.map(v => Number(v));

  const maxVal = Math.max(...numSeq);

  // auto-fit on sequence change
  if (nlState._lastCur !== S.cur || nlState._lastLen !== seq.length) {
    nlState.scale = (W - 100) / Math.max(maxVal, 1);
    nlState.scale = Math.max(0.05, Math.min(nlState.scale, 60));
    nlState.offsetX = 50;
    nlState._lastCur = S.cur;
    nlState._lastLen = seq.length;
    nlState._lastW = W;
  }

  // rescale when canvas width changes (zoom/resize)
  if (nlState._lastW && nlState._lastW !== W) {
    const ratio = W / nlState._lastW;
    nlState.offsetX *= ratio;
    nlState.scale *= ratio;
    nlState._lastW = W;
  }
  if (!nlState._lastW) nlState._lastW = W;

  const numToX = n => nlState.offsetX + n * nlState.scale;
  const xToNum = x => (x - nlState.offsetX) / nlState.scale;

  const minN = Math.max(1, Math.floor(xToNum(0)));
  const maxN = Math.min(maxVal, Math.ceil(xToNum(W)));

  // axis line (only 1 to maxVal)
  const axisStart = Math.max(0, numToX(1));
  const axisEnd = Math.min(W, numToX(maxVal));
  ctx.beginPath();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.moveTo(axisStart, AXIS_Y);
  ctx.lineTo(axisEnd, AXIS_Y);
  ctx.stroke();

  // tick spacing
  let tickStep = 1;
  if (nlState.scale < 0.3) tickStep = 500;
  else if (nlState.scale < 0.8) tickStep = 200;
  else if (nlState.scale < 1.5) tickStep = 100;
  else if (nlState.scale < 3) tickStep = 50;
  else if (nlState.scale < 6) tickStep = 20;
  else if (nlState.scale < 12) tickStep = 10;
  else if (nlState.scale < 25) tickStep = 5;
  else if (nlState.scale < 60) tickStep = 2;

  // draw ticks - numbers sit ON the axis with background knockout
  const startTick = Math.max(1, Math.floor(minN / tickStep) * tickStep);
  const tickLabels = [];
  for (let n = startTick; n <= maxN; n += tickStep) {
    if (n < 1) continue;
    const x = numToX(n);
    if (x < -10 || x > W + 10) continue;
    const isOdd = n % 2 === 1;
    ctx.beginPath();
    ctx.strokeStyle = isOdd ? 'rgba(239,68,68,.4)' : 'rgba(59,130,246,.4)';
    ctx.lineWidth = 0.8;
    ctx.moveTo(x, AXIS_Y - 5);
    ctx.lineTo(x, AXIS_Y + 5);
    ctx.stroke();

    if (nlState.scale > 2 || n % (tickStep * 5) === 0 || tickStep >= 50) {
      tickLabels.push({ n, x, isOdd });
    }
  }

  // draw tick labels with background to avoid overlap with axis
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const { n, x, isOdd } of tickLabels) {
    const label = n.toString();
    const tw = ctx.measureText(label).width + 4;
    ctx.fillStyle = '#0f1117';
    ctx.fillRect(x - tw / 2, AXIS_Y - 6, tw, 12);
    ctx.fillStyle = isOdd ? 'rgba(239,68,68,.7)' : 'rgba(59,130,246,.7)';
    ctx.fillText(label, x, AXIS_Y);
  }

  // draw arcs: up for increasing, down for decreasing
  const visSteps = Math.min(numSeq.length, S.step + 1);
  for (let i = 0; i < visSteps - 1; i++) {
    const from = numSeq[i];
    const to = numSeq[i + 1];
    const x1 = numToX(from);
    const x2 = numToX(to);
    const goingUp = to > from;
    const dist = Math.abs(x2 - x1);
    const arcH = Math.min((H / 2) - 14, 16 + dist * 0.22);
    const midX = (x1 + x2) / 2;
    const cpY = goingUp ? AXIS_Y - arcH : AXIS_Y + arcH;
    nlState.arcs.push({ x1, x2, midX, axisY: AXIS_Y, cpY, from, to, goingUp });
    const isHover = i === nlState.hoverArc;

    ctx.beginPath();
    if (isHover) {
      ctx.strokeStyle = goingUp ? '#ff6b6b' : '#4ade80';
      ctx.lineWidth = 3.5;
      ctx.shadowColor = goingUp ? '#ff6b6b' : '#4ade80';
      ctx.shadowBlur = 6;
    } else {
      ctx.strokeStyle = goingUp ? 'rgba(239,68,68,.5)' : 'rgba(34,197,94,.5)';
      ctx.lineWidth = 1.3;
    }
    ctx.moveTo(x1, AXIS_Y);
    ctx.quadraticCurveTo(midX, cpY, x2, AXIS_Y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // arrowhead
    if (dist > 4) {
      const t = 0.91;
      const ax = (1-t)*(1-t)*x1 + 2*(1-t)*t*midX + t*t*x2;
      const ay = (1-t)*(1-t)*AXIS_Y + 2*(1-t)*t*cpY + t*t*AXIS_Y;
      const angle = Math.atan2(AXIS_Y - ay, x2 - ax);
      ctx.beginPath();
      ctx.moveTo(x2, AXIS_Y);
      ctx.lineTo(x2 - 5*Math.cos(angle - 0.4), AXIS_Y - 5*Math.sin(angle - 0.4));
      ctx.moveTo(x2, AXIS_Y);
      ctx.lineTo(x2 - 5*Math.cos(angle + 0.4), AXIS_Y - 5*Math.sin(angle + 0.4));
      ctx.stroke();
    }
  }

  // tooltip for hovered arc (drawn last so it's on top)
  if (nlState.hoverArc >= 0 && nlState.hoverArc < nlState.arcs.length) {
    const arc = nlState.arcs[nlState.hoverArc];
    // actual bezier midpoint at t=0.5
    const tipX = 0.25 * arc.x1 + 0.5 * arc.midX + 0.25 * arc.x2;
    const tipY = 0.5 * AXIS_Y + 0.5 * arc.cpY;
    const op = arc.goingUp ? '×3+1' : '÷2';
    const label = `#${nlState.hoverArc}: ${arc.from} ${op} → ${arc.to}`;
    ctx.font = 'bold 11px monospace';
    const tw = ctx.measureText(label).width + 10;
    const th = 20;
    const boxY = arc.goingUp ? tipY - th - 4 : tipY + 4;
    ctx.fillStyle = 'rgba(20,22,30,.92)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(tipX - tw / 2, boxY, tw, th, 4);
    else ctx.rect(tipX - tw / 2, boxY, tw, th);
    ctx.fill();
    ctx.strokeStyle = arc.goingUp ? '#ff6b6b' : '#4ade80';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, tipX, boxY + th / 2);
  }

  // current step highlight dot + label (with background)
  if (visSteps > 0) {
    const curIdx = Math.min(S.step, numSeq.length - 1);
    const n = numSeq[curIdx];
    const x = numToX(n);
    const isOdd = n % 2 === 1;

    // dot
    ctx.beginPath();
    ctx.arc(x, AXIS_Y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = isOdd ? '#ef4444' : '#3b82f6';
    ctx.lineWidth = 2;
    ctx.stroke();

    // label above with knockout background
    const label = n.toString();
    ctx.font = 'bold 11px monospace';
    const tw = ctx.measureText(label).width + 6;
    const ly = AXIS_Y - 16;
    ctx.fillStyle = 'rgba(15,17,23,.85)';
    ctx.fillRect(x - tw / 2, ly - 7, tw, 14);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, ly);
  }

  // info bar
  ctx.fillStyle = '#555'; ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(`第${S.step}步  值=${numSeq[Math.min(S.step, numSeq.length-1)]}  ↑增大(红) ↓减小(绿)  滚轮缩放/拖拽`, W / 2, H - 3);
}

// --- 动画 ---
function startAnim() {
  const seq = S.seqs.get(S.cur);
  if (!seq) return;
  S.playing = true;
  if (S.step >= seq.length - 1) S.step = 0;
  document.getElementById('btn-play').style.display = 'none';
  document.getElementById('btn-pause').style.display = '';
  tick();
}

function tick() {
  const spd = +document.getElementById('speed-sl').value;
  const ms = Math.max(16, 300 / spd);
  S.timer = setTimeout(() => {
    const seq = S.seqs.get(S.cur);
    if (!seq || S.step >= seq.length - 1) { stopAnim(); return; }
    S.step++;
    stepSl.value = S.step;
    stepInf.textContent = `${S.step} / ${seq.length - 1}`;
    render();
    if (S.playing) tick();
  }, ms);
}

function stopAnim() {
  S.playing = false;
  if (S.timer) { clearTimeout(S.timer); S.timer = null; }
  document.getElementById('btn-play').style.display = '';
  document.getElementById('btn-pause').style.display = 'none';
}

document.getElementById('btn-run').onclick = run;
document.getElementById('btn-play').onclick = startAnim;
document.getElementById('btn-pause').onclick = stopAnim;
document.getElementById('btn-reset').onclick = () => { stopAnim(); S.step = 0; syncStep(); render(); };

const zoomSl = document.getElementById('zoom-slider');
const zoomVal = document.getElementById('zoom-val');
const mainEl = document.getElementById('main');
zoomSl.addEventListener('input', () => {
  const v = zoomSl.value;
  zoomVal.textContent = v + '%';
  mainEl.style.zoom = v / 100;
  requestAnimationFrame(render);
});

window.addEventListener('resize', () => { drawChart('trajectory'); drawChart('bitwidth'); drawNumberline(); drawCoral(); });

buildUI();
run();
</script>
