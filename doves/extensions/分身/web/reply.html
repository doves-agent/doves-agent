<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回复面板</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .warning { background: var(--bg-card); border: 1px solid var(--warning); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
  .section { margin-bottom: 16px; }
  .section h3 { font-size: 15px; margin-bottom: 12px; color: var(--text-secondary); }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls span { font-size: 13px; color: var(--text-secondary); }
  .controls .hint { font-size: 12px; color: var(--text-secondary); margin-left: 8px; }
  .btn-toggle { background: var(--success); color: #fff; }
  .btn-toggle:hover { opacity: 0.9; }
  .btn-toggle.off { background: var(--error); }
  .chat-window { height: 400px; overflow-y: auto; padding: 12px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
  .chat-bubble { margin-bottom: 12px; display: flex; }
  .chat-bubble.incoming { justify-content: flex-start; }
  .chat-bubble.outgoing { justify-content: flex-end; }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
  .incoming .bubble { background: var(--bg-input); color: var(--text); border-bottom-left-radius: 4px; }
  .outgoing .bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .bubble .time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; text-align: right; }
  .outgoing .bubble .time { color: rgba(255,255,255,0.7); }
  .bubble .source-tag { font-size: 10px; color: var(--text-secondary); display: block; margin-bottom: 2px; }
  .outgoing .bubble .source-tag { color: rgba(255,255,255,0.6); }
  .input-area { display: flex; gap: 8px; margin-top: 12px; }
  .input-area input { flex: 1; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div class="page-header">
    <h1 class="page-title">回复面板</h1>
  </div>
  <div class="warning">所有回复仅在您确认后发送，不会自动发出消息</div>

  <div class="card">
    <div class="controls">
      <span>自动回复:</span>
      <button class="btn btn-sm btn-toggle off" id="autoToggle" onclick="toggleAutoReply()">关闭</button>
      <span class="hint">开启后 AI 将自动分析消息并生成回复建议</span>
    </div>
  </div>

  <div class="card">
    <div class="section">
      <h3>模拟对话</h3>
      <div class="chat-window" id="chatWindow">
        <div class="empty-state">发送一条消息测试分身回复效果</div>
      </div>
      <div class="input-area">
        <input type="text" class="input" id="msgInput" placeholder="输入消息测试分身回复..." onkeydown="if(event.key==='Enter')sendTestMessage()">
        <button class="btn" onclick="sendTestMessage()">发送测试</button>
        <button class="btn btn-sm btn-success" onclick="generateReply()">AI 生成回复</button>
      </div>
    </div>
  </div>

<script src="/js/sdk.js"></script>
<script>
DoveSDK.init('分身');

let autoReplyOn = false;

function toggleAutoReply() {
  autoReplyOn = !autoReplyOn;
  const btn = document.getElementById('autoToggle');
  btn.textContent = autoReplyOn ? '开启' : '关闭';
  btn.className = 'btn btn-sm btn-toggle' + (autoReplyOn ? '' : ' off');
}

function addMessage(content, type, source) {
  const win = document.getElementById('chatWindow');
  const emptyEl = win.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();
  const time = new Date().toLocaleTimeString();
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + type;
  bubble.innerHTML = '<div class="bubble">' + (source ? '<span class="source-tag">' + source + '</span>' : '') + content + '<div class="time">' + time + '</div></div>';
  win.appendChild(bubble);
  win.scrollTop = win.scrollHeight;
}

async function sendTestMessage() {
  const msg = document.getElementById('msgInput').value.trim();
  if (!msg) return;
  addMessage(msg, 'incoming', '测试');
  document.getElementById('msgInput').value = '';
  try {
    const data = await DoveSDK.cmd('chat send', { message: '作为分身，请用我的语气风格回复这条消息：' + msg });
    if (data.success) {
      addMessage('已发起回复请求，请查看对话面板', 'outgoing', '分身');
    }
  } catch (e) {
    addMessage(e.message, 'incoming', '系统');
  }
}

async function generateReply() {
  addMessage('正在生成回复...', 'outgoing', '分身');
  try {
    await DoveSDK.cmd('chat send', { message: '请基于已学习的语气风格，对最近的消息生成一条分身回复' });
    addMessage('已发起生成请求，请在对话面板确认', 'outgoing', '分身');
  } catch (e) {
    addMessage(e.message, 'incoming', '系统');
  }
}
</script>
</body>
</html>
