<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MongoDB 索引管理</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { display: flex; height: 100vh; overflow: hidden; }
  .main { flex: 1; padding: 20px; overflow-y: auto; }
  .ai-panel { width: 340px; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .ai-panel .ai-header { padding: 14px 16px; background: var(--primary); color: #fff; font-weight: 600; font-size: 14px; }
  .ai-panel .ai-messages { flex: 1; overflow-y: auto; padding: 12px; }
  .ai-msg { margin-bottom: 10px; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; max-width: 95%; }
  .ai-msg.user { background: color-mix(in srgb, var(--primary) 10%, var(--bg)); margin-left: auto; }
  .ai-msg.assistant { background: var(--bg-input); }
  .ai-msg.system { background: color-mix(in srgb, var(--warning) 10%, var(--bg)); font-size: 12px; color: var(--warning); }
  .ai-panel .ai-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
  .ai-panel .ai-input-area input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg-input); color: var(--text); }
  .ai-panel .ai-input-area input:focus { outline: none; border-color: var(--primary); }
  .ai-panel .ai-input-area button { padding: 8px 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 2px solid var(--border); }
  .tab { padding: 8px 18px; cursor: pointer; font-size: 13px; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab:hover { color: var(--primary); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .tab-cont { display: none; }
  .tab-cont.active { display: block; }
  .config-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .config-row label { font-size: 13px; color: var(--text-secondary); min-width: 50px; }
  .config-row input, .config-row select { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--bg-input); color: var(--text); }
  .config-row input:focus { outline: none; border-color: var(--primary); }
  textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: 'Consolas', monospace; resize: vertical; background: var(--bg-input); color: var(--text); }
  textarea:focus { outline: none; border-color: var(--primary); }
  .idx-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .idx-table th { text-align: left; padding: 8px 10px; background: var(--bg-input); color: var(--text-secondary); font-weight: 600; border-bottom: 2px solid var(--border); }
  .idx-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .idx-table tr:hover td { background: var(--bg-input); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; }
  .badge-primary { background: color-mix(in srgb, var(--primary) 15%, var(--bg)); color: var(--primary); }
  .badge-success { background: color-mix(in srgb, var(--success) 15%, var(--bg)); color: var(--success); }
  .badge-warn { background: color-mix(in srgb, var(--warning) 15%, var(--bg)); color: var(--warning); }
  .result-area { max-height: 300px; overflow: auto; background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: var(--radius); font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-header h3 { font-size: 15px; color: var(--text); margin: 0; }
</style>
</head>
<body>
  <div class="main">
    <div class="page-header">
      <h1 class="page-title">MongoDB 索引管理</h1>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('list')">索引列表</div>
      <div class="tab" onclick="switchTab('create')">创建索引</div>
      <div class="tab" onclick="switchTab('advisor')">AI索引顾问</div>
    </div>

    <!-- 索引列表 -->
    <div id="tab-list" class="tab-cont active">
      <div class="card">
        <div class="section-header"><h3>索引列表</h3></div>
        <div class="config-row">
          <label>集合:</label>
          <input type="text" id="listCollection" placeholder="集合名称" style="max-width:200px">
          <button class="btn btn-sm" onclick="loadIndexes()">查看</button>
        </div>
        <div id="indexTable">
          <p class="empty-state">输入集合名称后点击查看</p>
        </div>
      </div>
    </div>

    <!-- 创建索引 -->
    <div id="tab-create" class="tab-cont">
      <div class="card">
        <div class="section-header"><h3>创建索引</h3></div>
        <div class="config-row">
          <label>集合:</label>
          <input type="text" id="createCollection" placeholder="集合名称" style="max-width:200px">
        </div>
        <div class="config-row">
          <label>索引键:</label>
          <textarea id="createKeys" rows="3" placeholder='{"fieldName": 1}  或  {"field1": 1, "field2": -1}'></textarea>
        </div>
        <div class="config-row">
          <label>名称:</label>
          <input type="text" id="createName" placeholder="索引名称（可选，自动生成）" style="flex:1">
        </div>
        <div class="config-row">
          <label><input type="checkbox" id="createUnique"> 唯一索引</label>
          <label><input type="checkbox" id="createSparse"> 稀疏索引</label>
          <label><input type="checkbox" id="createBg" checked> 后台创建</label>
        </div>
        <button class="btn" onclick="createIndex()">创建索引</button>
      </div>

      <div class="card">
        <div class="section-header"><h3>删除索引</h3></div>
        <div class="config-row">
          <label>集合:</label>
          <input type="text" id="dropCol" placeholder="集合名称" style="max-width:200px">
          <label>索引名:</label>
          <input type="text" id="dropName" placeholder="索引名称" style="max-width:200px">
          <button class="btn btn-sm btn-danger" onclick="dropIndex()">删除</button>
        </div>
      </div>
    </div>

    <!-- AI索引顾问 -->
    <div id="tab-advisor" class="tab-cont">
      <div class="card">
        <div class="section-header"><h3>AI 索引优化建议</h3></div>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">输入集合名和典型查询条件，AI 将基于 ESR 规则推荐最佳索引</p>
        <div class="config-row">
          <label>集合:</label>
          <input type="text" id="advisorCol" placeholder="集合名称" style="max-width:200px">
        </div>
        <div class="config-row">
          <label>查询:</label>
          <textarea id="advisorQuery" rows="3" placeholder='{"status": "active", "age": {"$gt": 25}}' style="flex:1"></textarea>
        </div>
        <div class="config-row">
          <label>排序:</label>
          <input type="text" id="advisorSort" placeholder='{"createdAt": -1}' style="flex:1">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="askAdvisor()">获取建议</button>
          <button class="btn btn-sm btn-outline" onclick="askFullAnalysis()">全集合诊断</button>
        </div>
      </div>
      <div class="card">
        <div class="section-header"><h3>分析结果</h3></div>
        <div class="result-area" id="advisorResult">等待分析...</div>
      </div>
    </div>
  </div>

  <!-- AI 助手面板 -->
  <div class="ai-panel">
    <div class="ai-header">AI 索引助手</div>
    <div class="ai-messages" id="aiMessages">
      <div class="ai-msg assistant">你好！我是索引管理助手，可以帮你：<br>- "帮我看看 users 集合需要什么索引"<br>- "分析这个查询的性能"<br>- "推荐最佳索引策略"</div>
    </div>
    <div class="ai-input-area">
      <input type="text" id="aiInput" placeholder="输入自然语言指令..." onkeydown="if(event.key==='Enter')sendAiMsg()">
      <button onclick="sendAiMsg()">发送</button>
    </div>
  </div>

<script src="/js/sdk.js"></script>
<script>
DoveSDK.init('MongoDB');

async function callMongoTool(toolName, args = {}) {
  try {
    const result = await DoveSDK.callTool(toolName, args, { extension: 'MongoDB' });
    if (!result.success) return { success: false, error: result.error || '工具调用失败' };
    return { success: true, data: result.data };
  } catch (e) { return { success: false, error: e.message }; }
}

async function chatWithAI(message) {
  try { await DoveSDK.cmd('chat send', { message }); } catch (e) { /* ignore */ }
}

function parseResult(data) {
  if (data?.content?.[0]?.text) {
    try { return JSON.parse(data.content[0].text); } catch { return data.content[0].text; }
  }
  return data;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-cont').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="'${name}'"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// 索引列表
async function loadIndexes() {
  const col = document.getElementById('listCollection').value.trim();
  if (!col) return;
  const container = document.getElementById('indexTable');
  container.innerHTML = '<p class="empty-state">查询中...</p>';

  const result = await callMongoTool('mongo_list_indexes', { collection: col });
  if (!result.success) {
    container.innerHTML = `<p class="empty-state">${result.error}</p>`;
    return;
  }

  const d = parseResult(result.data);
  const indexes = d.indexes || [];

  if (indexes.length === 0) {
    container.innerHTML = '<p class="empty-state">该集合无索引</p>';
    return;
  }

  let html = '<table class="idx-table"><thead><tr><th>名称</th><th>键</th><th>唯一</th><th>稀疏</th></tr></thead><tbody>';
  for (const ix of indexes) {
    const keys = JSON.stringify(ix.key || {});
    const isDefault = ix.name === '_id_';
    const uniqueBadge = ix.unique ? '<span class="badge badge-success">唯一</span>' : '';
    const sparseBadge = ix.sparse ? '<span class="badge badge-warn">稀疏</span>' : '';
    const defaultBadge = isDefault ? '<span class="badge badge-primary">默认</span>' : '';
    html += `<tr>
      <td>${ix.name} ${defaultBadge}</td>
      <td style="font-family:Consolas,monospace;font-size:12px">${keys}</td>
      <td>${uniqueBadge}</td>
      <td>${sparseBadge}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

// 创建索引
async function createIndex() {
  const col = document.getElementById('createCollection').value.trim();
  const keysStr = document.getElementById('createKeys').value.trim();
  if (!col || !keysStr) { DoveSDK.notify('warning', '请填写集合名和索引键'); return; }

  try {
    const keys = JSON.parse(keysStr);
    const options = {};
    if (document.getElementById('createUnique').checked) options.unique = true;
    if (document.getElementById('createSparse').checked) options.sparse = true;
    options.background = document.getElementById('createBg').checked;
    const name = document.getElementById('createName').value.trim();
    if (name) options.name = name;

    const result = await callMongoTool('mongo_create_index', { collection: col, keys, options });
    if (result.success) {
      const d = parseResult(result.data);
      DoveSDK.notify('success', `索引创建成功: ${d.indexName || '已创建'}`);
    } else {
      DoveSDK.notify('error', `创建失败: ${result.error}`);
    }
  } catch (e) {
    DoveSDK.notify('error', `参数错误: ${e.message}`);
  }
}

// 删除索引
async function dropIndex() {
  const col = document.getElementById('dropCol').value.trim();
  const name = document.getElementById('dropName').value.trim();
  if (!col || !name) { DoveSDK.notify('warning', '请填写集合名和索引名'); return; }
  const ok = await DoveSDK.confirm('删除索引', `确定要删除 ${col} 集合的索引 "${name}" 吗？此操作不可恢复！`);
  if (!ok) return;

  await chatWithAI(`删除 MongoDB ${col} 集合的索引 ${name}`);
  addAiMsg('assistant', '已提交删除索引请求到 AI，请确认执行。');
}

// AI索引顾问
async function askAdvisor() {
  const col = document.getElementById('advisorCol').value.trim();
  if (!col) { DoveSDK.notify('warning', '请输入集合名称'); return; }
  const el = document.getElementById('advisorResult');
  el.textContent = 'AI 分析中...';

  const query = document.getElementById('advisorQuery').value.trim();
  const sort = document.getElementById('advisorSort').value.trim();
  let msg = `使用 index_advisor 技能为 ${col} 集合推荐索引`;
  if (query) msg += `，典型查询条件: ${query}`;
  if (sort) msg += `，排序: ${sort}`;
  msg += '。请基于 ESR 规则给出建议';

  await chatWithAI(msg);
  el.textContent = '已提交索引顾问请求，请查看主对话面板获取 AI 分析结果。\n\n提示：也可在右侧 AI 助手中直接对话获取建议。';
}

async function askFullAnalysis() {
  const col = document.getElementById('advisorCol').value.trim();
  if (!col) { DoveSDK.notify('warning', '请输入集合名称'); return; }
  const el = document.getElementById('advisorResult');
  el.textContent = '全集合诊断中...';

  await chatWithAI(`使用 query_analyzer 技能对 ${col} 集合进行完整诊断，包括索引使用情况、慢查询检测、优化建议`);
  el.textContent = '已提交全集合诊断请求，请查看主对话面板获取详细分析。';
}

// AI 助手
function addAiMsg(role, text) {
  const container = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendAiMsg() {
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if (!msg) return;
  addAiMsg('user', msg);
  input.value = '';

  const colMatch = msg.match(/(?:查看|列出|分析)\s+(\w+)\s*集合/);
  if (colMatch) {
    addAiMsg('system', `正在加载 ${colMatch[1]} 集合的索引...`);
    document.getElementById('listCollection').value = colMatch[1];
    await loadIndexes();
    addAiMsg('assistant', `${colMatch[1]} 集合的索引已加载到主区域`);
    return;
  }

  await chatWithAI(msg);
  addAiMsg('assistant', '已发送到 AI，请查看主对话面板获取回复。');
}
</script>
</body>
</html>
