<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MongoDB 数据查询</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { display: flex; height: 100vh; overflow: hidden; }
  .main { flex: 1; padding: 20px; overflow-y: auto; }
  .ai-panel { width: 340px; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .ai-panel .ai-header { padding: 14px 16px; background: var(--primary); color: #fff; font-weight: 600; font-size: 14px; }
  .ai-panel .ai-messages { flex: 1; overflow-y: auto; padding: 12px; }
  .ai-msg { margin-bottom: 10px; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; max-width: 95%; }
  .ai-msg.user { background: color-mix(in srgb, var(--primary) 10%, var(--bg)); margin-left: auto; }
  .ai-msg.assistant { background: var(--bg-input); }
  .ai-msg.system { background: color-mix(in srgb, var(--warning) 10%, var(--bg)); font-size: 12px; color: var(--warning); }
  .ai-panel .ai-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
  .ai-panel .ai-input-area input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg-input); color: var(--text); }
  .ai-panel .ai-input-area input:focus { outline: none; border-color: var(--primary); }
  .ai-panel .ai-input-area button { padding: 8px 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 2px solid var(--border); }
  .tab { padding: 8px 18px; cursor: pointer; font-size: 13px; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab:hover { color: var(--primary); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .tab-cont { display: none; }
  .tab-cont.active { display: block; }
  .config-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .config-row label { font-size: 13px; color: var(--text-secondary); min-width: 50px; }
  .config-row input, .config-row select { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--bg-input); color: var(--text); }
  .config-row input:focus { outline: none; border-color: var(--primary); }
  textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: 'Consolas', monospace; resize: vertical; background: var(--bg-input); color: var(--text); }
  textarea:focus { outline: none; border-color: var(--primary); }
  .q-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .q-chip { padding: 5px 14px; border: 1px solid var(--border); border-radius: 16px; font-size: 12px; cursor: pointer; background: var(--bg-card); color: var(--text-secondary); transition: all 0.15s; }
  .q-chip:hover { border-color: var(--primary); color: var(--primary); }
  .result-area { max-height: 420px; overflow: auto; background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: var(--radius); font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .result-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: 'Consolas', monospace; }
  .data-table th { text-align: left; padding: 6px 8px; background: var(--bg-input); color: var(--text-secondary); border-bottom: 2px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .data-table tr:hover td { background: var(--bg-input); }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-header h3 { font-size: 15px; color: var(--text); margin: 0; }
</style>
</head>
<body>
  <div class="main">
    <div class="page-header">
      <h1 class="page-title">MongoDB 数据查询</h1>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('nl')">自然语言</div>
      <div class="tab" onclick="switchTab('structured')">结构化查询</div>
      <div class="tab" onclick="switchTab('aggregate')">聚合分析</div>
    </div>

    <!-- 自然语言查询 -->
    <div id="tab-nl" class="tab-cont active">
      <div class="card">
        <div class="section-header"><h3>自然语言查询</h3></div>
        <div class="q-chips">
          <span class="q-chip" onclick="fillNl('findAll')">查询全部</span>
          <span class="q-chip" onclick="fillNl('findFilter')">条件查询</span>
          <span class="q-chip" onclick="fillNl('groupBy')">分组统计</span>
          <span class="q-chip" onclick="fillNl('sortBy')">排序查询</span>
          <span class="q-chip" onclick="fillNl('count')">计数统计</span>
          <span class="q-chip" onclick="fillNl('distinct')">去重值</span>
          <span class="q-chip" onclick="fillNl('explain')">执行计划</span>
        </div>
        <textarea id="nlQuery" rows="4" placeholder="输入自然语言描述，如：查询 users 集合中年龄大于 25 的用户，按注册时间倒序，限制 10 条"></textarea>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button class="btn" onclick="execNl()">执行查询</button>
          <button class="btn btn-sm btn-outline" onclick="document.getElementById('nlQuery').value=''">清空</button>
        </div>
      </div>
    </div>

    <!-- 结构化查询 -->
    <div id="tab-structured" class="tab-cont">
      <div class="card">
        <div class="section-header"><h3>结构化查询</h3></div>
        <div class="config-row">
          <label>集合:</label>
          <input type="text" id="sCollection" placeholder="集合名称" style="max-width:200px">
        </div>
        <div class="config-row">
          <label>条件:</label>
          <textarea id="sQuery" rows="3" placeholder='{"status": "active"}' style="flex:1"></textarea>
        </div>
        <div class="config-row">
          <label>排序:</label>
          <input type="text" id="sSort" placeholder='{"createdAt": -1}' style="flex:1">
        </div>
        <div class="config-row">
          <label>字段:</label>
          <input type="text" id="sProjection" placeholder='{"name": 1, "email": 1}' style="flex:1">
        </div>
        <div class="config-row">
          <label>条数:</label>
          <input type="number" id="sLimit" value="20" style="width:80px">
          <label>跳过:</label>
          <input type="number" id="sSkip" value="0" style="width:80px">
          <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="sExplain"> Explain</label>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="execStructured()">查询</button>
          <button class="btn btn-sm btn-outline" onclick="execStructured('count')">计数</button>
          <button class="btn btn-sm btn-outline" onclick="execStructured('distinct')">去重</button>
        </div>
      </div>
    </div>

    <!-- 聚合分析 -->
    <div id="tab-aggregate" class="tab-cont">
      <div class="card">
        <div class="section-header"><h3>聚合管道</h3></div>
        <div class="config-row">
          <label>集合:</label>
          <input type="text" id="aCollection" placeholder="集合名称" style="max-width:200px">
        </div>
        <textarea id="aPipeline" rows="6" placeholder='[{"$group": {"_id": "$status", "count": {"$sum": 1}}}]'></textarea>
        <div class="config-row" style="margin-top:8px">
          <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="aExplain"> Explain</label>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn" onclick="execAggregate()">执行聚合</button>
          <button class="btn btn-sm btn-outline" onclick="fillPipeline('groupBy')">分组统计</button>
          <button class="btn btn-sm btn-outline" onclick="fillPipeline('topN')">Top N</button>
          <button class="btn btn-sm btn-outline" onclick="fillPipeline('dateRange')">日期范围</button>
        </div>
      </div>
    </div>

    <!-- 结果区 -->
    <div class="card">
      <div class="result-bar">
        <span id="resultInfo">执行查询后结果将显示在这里</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-outline" onclick="copyResult()">复制</button>
          <button class="btn btn-sm btn-outline" onclick="exportResult()">导出</button>
          <button class="btn btn-sm btn-outline" onclick="toggleView()">表格/JSON</button>
        </div>
      </div>
      <div id="resultJson" class="result-area">等待查询...</div>
      <div id="resultTable" style="display:none;overflow:auto;max-height:420px"></div>
    </div>
  </div>

  <!-- AI 助手面板 -->
  <div class="ai-panel">
    <div class="ai-header">AI 查询助手</div>
    <div class="ai-messages" id="aiMessages">
      <div class="ai-msg assistant">你好！我是查询助手，可以用自然语言帮你写查询、分析数据。试试：<br>- "查询最近注册的用户"<br>- "帮我写一个按状态分组的聚合"<br>- "这个查询怎么优化？"</div>
    </div>
    <div class="ai-input-area">
      <input type="text" id="aiInput" placeholder="输入自然语言指令..." onkeydown="if(event.key==='Enter')sendAiMsg()">
      <button onclick="sendAiMsg()">发送</button>
    </div>
  </div>

<script src="/js/sdk.js"></script>
<script>
DoveSDK.init('MongoDB');

async function callMongoTool(toolName, args = {}) {
  try {
    const result = await DoveSDK.callTool(toolName, args, { extension: 'MongoDB' });
    if (!result.success) return { success: false, error: result.error || '工具调用失败' };
    return { success: true, data: result.data };
  } catch (e) { return { success: false, error: e.message }; }
}

async function chatWithAI(message) {
  try { await DoveSDK.cmd('chat send', { message }); } catch { /* ignore */ }
}

let lastResult = null;
let isTableView = false;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-cont').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="'${name}'"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

function parseResult(data) {
  if (data?.content?.[0]?.text) {
    try { return JSON.parse(data.content[0].text); } catch { return data.content[0].text; }
  }
  return data;
}

function showResult(parsed) {
  lastResult = parsed;
  if (isTableView && Array.isArray(parsed?.data)) {
    renderTable(parsed.data);
  } else {
    document.getElementById('resultJson').textContent = JSON.stringify(parsed, null, 2);
    document.getElementById('resultJson').style.display = '';
    document.getElementById('resultTable').style.display = 'none';
  }
}

function renderTable(rows) {
  const container = document.getElementById('resultTable');
  document.getElementById('resultJson').style.display = 'none';
  container.style.display = '';
  if (!rows.length) { container.innerHTML = '<p style="padding:14px;color:var(--text-secondary)">无数据</p>'; return; }
  const keys = [...new Set(rows.flatMap(r => Object.keys(r)))].filter(k => k !== '_id');
  keys.unshift('_id');
  let html = '<table class="data-table"><thead><tr>';
  for (const k of keys) html += `<th>${k}</th>`;
  html += '</tr></thead><tbody>';
  for (const row of rows) {
    html += '<tr>';
    for (const k of keys) html += `<td title="${String(row[k] ?? '').replace(/"/g, '&quot;')}">${truncate(String(row[k] ?? ''), 60)}</td>`;
    html += '</tr>';
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }

function toggleView() {
  isTableView = !isTableView;
  if (lastResult) showResult(lastResult);
}

function updateResultInfo(text) { document.getElementById('resultInfo').textContent = text; }

function copyResult() {
  navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2)).then(() => updateResultInfo('已复制到剪贴板'));
}

function exportResult() {
  const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mongo_export_${Date.now()}.json`;
  a.click();
  updateResultInfo('已导出文件');
}

// 自然语言查询
function fillNl(type) {
  const col = document.getElementById('sCollection')?.value?.trim() || 'users';
  const templates = {
    findAll: `查询 ${col} 集合中的所有文档，限制 10 条`,
    findFilter: `查询 ${col} 集合中符合条件的文档，限制 20 条`,
    groupBy: `对 ${col} 集合按某个字段分组，统计每组的文档数量`,
    sortBy: `查询 ${col} 集合，按某个字段倒序排列，限制 10 条`,
    count: `统计 ${col} 集合中的文档数量`,
    distinct: `获取 ${col} 集合中某个字段的所有去重值`,
    explain: `对 ${col} 集合执行一个查询并显示 explain 执行计划`,
  };
  document.getElementById('nlQuery').value = templates[type] || '';
}

async function execNl() {
  const q = document.getElementById('nlQuery').value.trim();
  if (!q) return;
  updateResultInfo('AI 解析自然语言查询...');
  document.getElementById('resultJson').textContent = '执行中...';

  await chatWithAI(q);
  updateResultInfo('自然语言查询已发送到 AI，请查看主对话面板');
  document.getElementById('resultJson').textContent = '已提交自然语言查询到 AI，结果将在主对话面板展示。\n\n提示：结构化查询可直接在此页面展示结果。';
}

// 结构化查询
async function execStructured(mode = 'find') {
  const col = document.getElementById('sCollection').value.trim();
  if (!col) { DoveSDK.notify('warning', '请输入集合名称'); return; }
  updateResultInfo('执行中...');
  document.getElementById('resultJson').textContent = '执行中...';

  try {
    const queryStr = document.getElementById('sQuery').value.trim() || '{}';
    const query = JSON.parse(queryStr);

    if (mode === 'count') {
      const result = await callMongoTool('mongo_count_documents', { collection: col, query });
      if (result.success) {
        const d = parseResult(result.data);
        showResult(d);
        updateResultInfo(`${col} 计数: ${d.count}`);
      } else {
        document.getElementById('resultJson').textContent = result.error;
        updateResultInfo('查询失败');
      }
      return;
    }

    if (mode === 'distinct') {
      const field = prompt('请输入要去重的字段名:');
      if (!field) return;
      const result = await callMongoTool('mongo_distinct', { collection: col, field, query });
      if (result.success) {
        const d = parseResult(result.data);
        showResult(d);
        updateResultInfo(`${col}.${field} 去重值: ${d.values?.length ?? 0} 个`);
      } else {
        document.getElementById('resultJson').textContent = result.error;
      }
      return;
    }

    const sortStr = document.getElementById('sSort').value.trim();
    const projStr = document.getElementById('sProjection').value.trim();
    const limit = parseInt(document.getElementById('sLimit').value) || 20;
    const skip = parseInt(document.getElementById('sSkip').value) || 0;
    const explain = document.getElementById('sExplain').checked;

    const options = { limit, skip };
    if (sortStr) options.sort = JSON.parse(sortStr);
    if (projStr) options.projection = JSON.parse(projStr);

    const result = await callMongoTool('mongo_find', { collection: col, query, options, explain });

    if (result.success) {
      const d = parseResult(result.data);
      showResult(d);
      if (explain) {
        updateResultInfo(`${col} explain 执行计划`);
      } else {
        updateResultInfo(`${col} 查询结果: ${d.data?.length ?? 0} 条 (limit: ${limit})`);
      }
    } else {
      document.getElementById('resultJson').textContent = result.error;
      updateResultInfo('查询失败');
    }
  } catch (e) {
    document.getElementById('resultJson').textContent = `参数错误: ${e.message}`;
    updateResultInfo('参数解析失败');
  }
}

// 聚合分析
function fillPipeline(type) {
  const templates = {
    groupBy: `[{"$group": {"_id": "$status", "count": {"$sum": 1}}}]`,
    topN: `[{"$sort": {"createdAt": -1}}, {"$limit": 10}]`,
    dateRange: `[{"$match": {"createdAt": {"$gte": "2024-01-01"}}}, {"$group": {"_id": {"$dateToString": {"format": "%Y-%m", "date": "$createdAt"}}, "count": {"$sum": 1}}}]`,
  };
  document.getElementById('aPipeline').value = templates[type] || '';
}

async function execAggregate() {
  const col = document.getElementById('aCollection').value.trim();
  const pipelineStr = document.getElementById('aPipeline').value.trim();
  if (!col || !pipelineStr) { DoveSDK.notify('warning', '请输入集合名称和聚合管道'); return; }
  const explain = document.getElementById('aExplain').checked;
  updateResultInfo('执行聚合...');
  document.getElementById('resultJson').textContent = '执行中...';

  try {
    const pipeline = JSON.parse(pipelineStr);
    const result = await callMongoTool('mongo_aggregate', { collection: col, pipeline, explain });
    if (result.success) {
      const d = parseResult(result.data);
      showResult(d);
      updateResultInfo(`${col} 聚合结果: ${d.results?.length ?? 0} 条`);
    } else {
      document.getElementById('resultJson').textContent = result.error;
      updateResultInfo('聚合失败');
    }
  } catch (e) {
    document.getElementById('resultJson').textContent = `参数错误: ${e.message}`;
  }
}

// AI 助手
function addAiMsg(role, text) {
  const container = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendAiMsg() {
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if (!msg) return;
  addAiMsg('user', msg);
  input.value = '';

  const quickMatch = matchQueryAction(msg);
  if (quickMatch) {
    addAiMsg('system', `正在执行: ${quickMatch.desc}...`);
    const result = await callMongoTool(quickMatch.tool, quickMatch.args);
    if (result.success) {
      const d = parseResult(result.data);
      showResult(d);
      addAiMsg('assistant', `查询完成，${d.data?.length ?? d.results?.length ?? d.count ?? 0} 条结果已展示在主区域`);
    } else {
      addAiMsg('assistant', `执行失败: ${result.error}`);
    }
  } else {
    await chatWithAI(msg);
    addAiMsg('assistant', '已发送到 AI 对话，请查看主对话面板获取详细回复。');
  }
}

function matchQueryAction(msg) {
  const m = msg.toLowerCase();
  const colMatch = msg.match(/(?:查询|列出|查看)\s+(\w+)\s*集合/);
  const col = colMatch ? colMatch[1] : null;

  if (col && (m.includes('计数') || m.includes('数量') || m.includes('多少')))
    return { tool: 'mongo_count_documents', args: { collection: col, query: {} }, desc: `${col} 计数` };
  if (col && m.includes('去重'))
    return { tool: 'mongo_distinct', args: { collection: col, field: m.match(/(\w+)字段/)?.[1] || '_id' }, desc: `${col} 去重` };
  if (col)
    return { tool: 'mongo_find', args: { collection: col, query: {}, options: { limit: 20 } }, desc: `查询 ${col}` };
  return null;
}
</script>
</body>
</html>
