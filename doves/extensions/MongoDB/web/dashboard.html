<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MongoDB 数据库概览</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { display: flex; height: 100vh; overflow: hidden; }
  .main { flex: 1; padding: 20px; overflow-y: auto; }
  .ai-panel { width: 340px; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .ai-panel .ai-header { padding: 14px 16px; background: var(--primary); color: #fff; font-weight: 600; font-size: 14px; }
  .ai-panel .ai-messages { flex: 1; overflow-y: auto; padding: 12px; }
  .ai-msg { margin-bottom: 10px; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; max-width: 95%; }
  .ai-msg.user { background: color-mix(in srgb, var(--primary) 10%, var(--bg)); margin-left: auto; }
  .ai-msg.assistant { background: var(--bg-input); }
  .ai-msg.system { background: color-mix(in srgb, var(--warning) 10%, var(--bg)); font-size: 12px; color: var(--warning); }
  .ai-panel .ai-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
  .ai-panel .ai-input-area input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg-input); color: var(--text); }
  .ai-panel .ai-input-area input:focus { outline: none; border-color: var(--primary); }
  .ai-panel .ai-input-area button { padding: 8px 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .config-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .config-row label { font-size: 13px; color: var(--text-secondary); min-width: 60px; }
  .config-row input { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; flex: 1; min-width: 200px; background: var(--bg-input); color: var(--text); }
  .config-row input:focus { outline: none; border-color: var(--primary); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .status-dot.ok { background: var(--success); }
  .status-dot.err { background: var(--error); }
  .status-dot.wait { background: var(--warning); }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
  .stat-card { text-align: center; padding: 16px 10px; background: var(--bg-input); border-radius: var(--radius); border: 1px solid var(--border); }
  .stat-card .val { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-card .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .collection-list { list-style: none; padding: 0; margin: 0; }
  .collection-list li { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; }
  .collection-list li:hover { background: var(--bg-input); }
  .collection-list li .name { flex: 1; font-weight: 600; font-size: 13px; font-family: 'Consolas', monospace; color: var(--text); }
  .collection-list li .count { font-size: 12px; color: var(--text-secondary); background: var(--bg-input); padding: 2px 8px; border-radius: 10px; }
  .collection-list li .size { font-size: 12px; color: var(--text-secondary); }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-header h3 { font-size: 15px; color: var(--text); margin: 0; }
</style>
</head>
<body>
  <div class="main">
    <div class="page-header">
      <h1 class="page-title">MongoDB 数据库概览</h1>
    </div>

    <div class="card">
      <div class="section-header"><h3>连接配置</h3></div>
      <div class="config-row">
        <label>连接串:</label>
        <input type="text" id="connString" placeholder="mongodb://localhost:27017" value="mongodb://localhost:27017">
        <label>数据库:</label>
        <input type="text" id="dbName" placeholder="mydb" value="doves_user_data" style="max-width:180px">
        <button class="btn btn-sm" onclick="connectDB()">连接</button>
        <button class="btn btn-sm btn-outline" onclick="testConnection()">测试</button>
      </div>
      <div id="connStatus" style="font-size:12px;color:var(--text-secondary)">
        <span class="status-dot wait"></span> 未连接
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h3>数据库状态</h3>
        <button class="btn btn-sm btn-outline" onclick="loadStats()">刷新</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="val" id="colCount">-</div><div class="lbl">集合数</div></div>
        <div class="stat-card"><div class="val" id="docCount">-</div><div class="lbl">文档总数</div></div>
        <div class="stat-card"><div class="val" id="dataSize">-</div><div class="lbl">数据大小</div></div>
        <div class="stat-card"><div class="val" id="idxCount">-</div><div class="lbl">索引数</div></div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h3>集合列表</h3>
        <button class="btn btn-sm btn-outline" onclick="loadCollections()">刷新</button>
      </div>
      <ul class="collection-list" id="collectionList">
        <li class="empty-state">请先连接数据库</li>
      </ul>
    </div>
  </div>

  <!-- AI 助手面板 -->
  <div class="ai-panel">
    <div class="ai-header">AI 助手</div>
    <div class="ai-messages" id="aiMessages">
      <div class="ai-msg assistant">你好！我是 MongoDB AI 助手，可以帮你用自然语言管理数据库。试试输入：<br>- "列出所有集合"<br>- "查看 users 集合的统计"<br>- "这个数据库有什么数据"</div>
    </div>
    <div class="ai-input-area">
      <input type="text" id="aiInput" placeholder="输入自然语言指令..." onkeydown="if(event.key==='Enter')sendAiMsg()">
      <button onclick="sendAiMsg()">发送</button>
    </div>
  </div>

<script src="/js/sdk.js"></script>
<script>
DoveSDK.init('MongoDB');

async function callMongoTool(toolName, args = {}) {
  try {
    const result = await DoveSDK.callTool(toolName, args, { extension: 'MongoDB' });
    if (!result.success) return { success: false, error: result.error || '工具调用失败' };
    return { success: true, data: result.data };
  } catch (e) { return { success: false, error: e.message }; }
}

async function chatWithAI(message) {
  try { await DoveSDK.cmd('chat send', { message }); } catch { /* ignore */ }
}

let isConnected = false;

function setConnStatus(status, text) {
  const el = document.getElementById('connStatus');
  const cls = status === 'ok' ? 'ok' : status === 'err' ? 'err' : 'wait';
  el.innerHTML = `<span class="status-dot ${cls}"></span> ${text}`;
  isConnected = status === 'ok';
}

async function connectDB() {
  const uri = document.getElementById('connString').value.trim();
  const db = document.getElementById('dbName').value.trim();
  setConnStatus('wait', '连接中...');

  const result = await callMongoTool('mongo_connect', {
    action: 'config',
    connectionString: uri,
    dbName: db,
  });

  if (result.success) {
    setConnStatus('ok', `已连接 → ${db}`);
    loadStats();
    loadCollections();
    addAiMsg('assistant', `已连接到数据库 <b>${db}</b>`);
  } else {
    setConnStatus('err', `连接失败: ${result.error}`);
    addAiMsg('assistant', `连接失败: ${result.error}`);
  }
}

async function testConnection() {
  setConnStatus('wait', '测试中...');
  const result = await callMongoTool('mongo_connect', { action: 'test' });
  if (result.success) {
    setConnStatus('ok', '连接测试成功');
    addAiMsg('assistant', 'MongoDB 连接正常');
  } else {
    setConnStatus('err', `测试失败: ${result.error}`);
    addAiMsg('assistant', `连接测试失败: ${result.error}`);
  }
}

async function loadStats() {
  document.getElementById('colCount').textContent = '...';
  document.getElementById('docCount').textContent = '...';
  document.getElementById('dataSize').textContent = '...';
  document.getElementById('idxCount').textContent = '...';

  const result = await callMongoTool('mongo_connect', { action: 'status' });
  if (result.success) {
    const d = result.data;
    document.getElementById('colCount').textContent = d.collectionsCount ?? '-';
    document.getElementById('docCount').textContent = '-';
    document.getElementById('dataSize').textContent = d.dataSize ? formatSize(d.dataSize) : '-';
    document.getElementById('idxCount').textContent = '-';
  } else {
    document.getElementById('colCount').textContent = '?';
    addAiMsg('system', `获取状态失败: ${result.error}`);
  }
}

async function loadCollections() {
  const list = document.getElementById('collectionList');
  list.innerHTML = '<li class="empty-state">加载中...</li>';

  const result = await callMongoTool('mongo_list_collections', { detailed: true });
  if (result.success) {
    const d = result.data;
    const cols = d.collections || [];

    if (cols.length === 0) {
      list.innerHTML = '<li class="empty-state">暂无集合</li>';
      return;
    }

    let totalDocs = 0;
    list.innerHTML = '';
    for (const col of cols) {
      totalDocs += col.documentCount || 0;
      const li = document.createElement('li');
      li.onclick = () => { addAiMsg('user', `查看 ${col.name} 集合的详细信息`); chatWithAI(`查看 MongoDB ${col.name} 集合的详细统计信息`); };
      li.innerHTML = `
        <span class="name">${col.name}</span>
        <span class="count">${col.documentCount ?? '?'} 文档</span>
        <span class="size">${col.storageSize ? formatSize(col.storageSize) : ''}</span>
      `;
      list.appendChild(li);
    }

    document.getElementById('docCount').textContent = totalDocs || '-';
  } else {
    list.innerHTML = `<li class="empty-state">加载失败: ${result.error}</li>`;
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

// AI 助手
function addAiMsg(role, text) {
  const container = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendAiMsg() {
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if (!msg) return;
  addAiMsg('user', msg);
  input.value = '';

  const quickMatch = matchQuickAction(msg);
  if (quickMatch) {
    addAiMsg('system', `正在执行: ${quickMatch.desc}...`);
    const result = await callMongoTool(quickMatch.tool, quickMatch.args);
    if (result.success) {
      const d = result.data;
      addAiMsg('assistant', formatToolResult(quickMatch.tool, d));
    } else {
      addAiMsg('assistant', `执行失败: ${result.error}`);
    }
  } else {
    await chatWithAI(msg);
    addAiMsg('assistant', '已发送到 AI 对话，请查看主对话面板获取详细回复。');
  }
}

function matchQuickAction(msg) {
  const m = msg.toLowerCase();
  if (m.includes('集合') && (m.includes('列出') || m.includes('所有') || m.includes('查看')))
    return { tool: 'mongo_list_collections', args: { detailed: true }, desc: '列出集合' };
  if (m.includes('连接') && (m.includes('状态') || m.includes('测试')))
    return { tool: 'mongo_connect', args: { action: 'status' }, desc: '连接状态' };
  if (m.includes('统计') || m.includes('概览') || m.includes('状态'))
    return { tool: 'mongo_connect', args: { action: 'status' }, desc: '数据库状态' };
  const colMatch = msg.match(/(?:查看|统计|分析)\s+(\w+)\s*集合/);
  if (colMatch)
    return { tool: 'mongo_collection_stats', args: { collection: colMatch[1] }, desc: `${colMatch[1]} 集合统计` };
  return null;
}

function formatToolResult(tool, data) {
  try {
    if (tool === 'mongo_list_collections') {
      const cols = data.collections || [];
      if (cols.length === 0) return '当前数据库没有集合';
      return `共 <b>${cols.length}</b> 个集合：<br>` +
        cols.map(c => `- <b>${c.name}</b> -- ${c.documentCount ?? '?'} 文档${c.storageSize ? '，' + formatSize(c.storageSize) : ''}`).join('<br>');
    }
    if (tool === 'mongo_connect') {
      if (data.connected) return `已连接数据库 <b>${data.dbName}</b>，${data.collectionsCount} 个集合`;
      return '未连接';
    }
    if (tool === 'mongo_collection_stats') {
      return `<b>${data.collection}</b>: ${data.documentCount} 文档，${formatSize(data.storageSize)}，${data.indexes} 个索引，平均文档 ${data.avgDocumentSize ? formatSize(data.avgDocumentSize) : '-'}`;
    }
    return `<pre>${JSON.stringify(data, null, 2)}</pre>`;
  } catch (e) {
    return `<pre>${JSON.stringify(data, null, 2)}</pre>`;
  }
}
</script>
</body>
</html>
