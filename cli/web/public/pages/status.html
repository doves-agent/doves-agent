<div class="page-header">
  <h1 class="page-title">系统状态</h1>
  <button class="btn btn-outline btn-sm" id="status-refresh">刷新</button>
</div>

<div id="status-content" class="loading">加载中...</div>

<script>
(function() {
  const container = document.getElementById('status-content');
  document.getElementById('status-refresh').addEventListener('click', loadStatus);
  loadStatus();

  async function loadStatus() {
    container.innerHTML = '<div class="loading">加载中...</div>';

    const [statusResult, configResult] = await Promise.all([
      DoveSDK.cmd('status', { source: 'status-page' }),
      DoveSDK.getConfig()
    ]);

    let html = '';

    // 连接信息
    html += `<div class="card" style="margin-bottom:12px">
      <h3 style="margin-bottom:8px;font-size:14px">连接信息</h3>
      <div style="font-size:13px;display:grid;grid-template-columns:120px 1fr;gap:4px">
        <span style="color:var(--text-secondary)">网关地址</span><span>${configResult.gateway || '-'}</span>
        <span style="color:var(--text-secondary)">用户</span><span>${configResult.username || '未登录'}</span>
        <span style="color:var(--text-secondary)">用户ID</span><span style="font-family:monospace">${configResult.userId || '-'}</span>
      </div>
    </div>`;

    // Ping 测试
    html += `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px">
        <h3 style="font-size:14px">连通性</h3>
        <button class="btn btn-sm btn-outline" id="ping-btn">Ping</button>
        <span id="ping-result" style="font-size:13px;color:var(--text-secondary)"></span>
      </div>
    </div>`;

    // Server 状态
    if (statusResult.success && statusResult.data) {
      const d = statusResult.data;
      html += `<div class="card">
        <h3 style="margin-bottom:8px;font-size:14px">Server 状态</h3>
        <pre style="font-size:12px;background:var(--bg-input);padding:12px;border-radius:var(--radius-sm);overflow:auto;max-height:300px">${JSON.stringify(d, null, 2)}</pre>
      </div>`;
    } else {
      html += `<div class="card"><div class="empty-state">无法获取 Server 状态 (${statusResult.error || '未连接'})</div></div>`;
    }

    container.innerHTML = html;

    document.getElementById('ping-btn')?.addEventListener('click', async () => {
      const result = document.getElementById('ping-result');
      result.textContent = '...';
      const r = await DoveSDK.cmd('ping', { source: 'status-page' });
      if (r.success) {
        result.textContent = `连通 (${r.data?.latency || 0}ms)`;
        result.style.color = 'var(--success)';
      } else {
        result.textContent = `失败: ${r.error || '超时'}`;
        result.style.color = 'var(--error)';
      }
    });
  }
})();
</script>
