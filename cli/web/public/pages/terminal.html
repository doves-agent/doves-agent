<div class="page-header">
  <h1 class="page-title">终端</h1>
  <button class="btn btn-outline btn-sm" id="term-clear">清屏</button>
</div>

<div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 200px)">
  <div id="term-output" style="flex:1;overflow-y:auto;padding:12px;font-family:monospace;font-size:13px;background:#0f172a;color:#e2e8f0;border-radius:var(--radius) var(--radius) 0 0"></div>
  <div style="display:flex;align-items:center;background:#1e293b;padding:8px 12px;border-radius:0 0 var(--radius) var(--radius);gap:8px">
    <span style="color:#4a6cf7;font-family:monospace;font-weight:bold">dove&gt;</span>
    <input id="term-input" class="input" style="background:transparent;border:none;color:#e2e8f0;font-family:monospace;font-size:13px" placeholder="输入命令..." autocomplete="off">
  </div>
</div>

<script>
(function() {
  const output = document.getElementById('term-output');
  const input = document.getElementById('term-input');
  const clearBtn = document.getElementById('term-clear');
  const history = [];
  let historyIdx = -1;

  input.focus();

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      execute(input.value);
      input.value = '';
      historyIdx = -1;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length && historyIdx < history.length - 1) {
        historyIdx++;
        input.value = history[history.length - 1 - historyIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx > 0) { historyIdx--; input.value = history[history.length - 1 - historyIdx]; }
      else { historyIdx = -1; input.value = ''; }
    }
  });

  clearBtn.addEventListener('click', () => { output.innerHTML = ''; });

  async function execute(cmd) {
    cmd = cmd.trim();
    if (!cmd) return;
    history.push(cmd);

    appendLine(`dove> ${cmd}`, 'input');

    if (cmd === 'clear' || cmd === 'cls') { output.innerHTML = ''; return; }
    if (cmd === 'help') {
      appendLine('可用命令: chat send, task list, task get <id>, status, ping, dove list, memory list, event list, file ls, storage status', 'help');
      return;
    }

    const result = await DoveSDK.cmd(cmd, { source: 'terminal' });

    if (result.success) {
      const data = result.data;
      if (typeof data === 'string') { appendLine(data, 'output'); }
      else if (data) { appendLine(JSON.stringify(data, null, 2), 'output'); }
      else { appendLine(result.message || '完成', 'success'); }
    } else {
      appendLine(result.error || '执行失败', 'error');
    }
  }

  function appendLine(text, type) {
    const pre = document.createElement('pre');
    pre.style.margin = '2px 0';
    pre.style.whiteSpace = 'pre-wrap';
    pre.style.wordBreak = 'break-all';
    const colors = { input: '#94a3b8', output: '#e2e8f0', error: '#ef4444', success: '#22c55e', help: '#f59e0b' };
    pre.style.color = colors[type] || colors.output;
    pre.textContent = text;
    output.appendChild(pre);
    output.scrollTop = output.scrollHeight;
  }
})();
</script>
